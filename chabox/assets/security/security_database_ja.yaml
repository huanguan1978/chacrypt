# Base de conocimientos de sesiones de seguridad ChaBox - Edición en japonés

# ------------------------------------------------------------
# 1. プロのアドバイス (ChaBox, chapose & ft:filetools ドキュメントに基づく)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **プロのヒント：アクティブ・プライバシーシールド**\nChaBoxは起動中、システムによるスクリーンショットや画面録画を自動的に無効化します。これにより、マルウェアがプライベートなメモや機密データをキャプチャするのを防ぎ、あなたの「プライベートな目」を完全に保護します。"
  - "#### **プロのヒント：メモリ上でのみプレビュー**\n「セキュアボルト」でファイルをプレビューする際、ChaBoxはデータを直接メモリ上で復号化します。**ディスク上に一時的な平文ファイルが作成されることは一切ないため**、機密データの断片がディスクに残ることはありません。"
  - "#### **プロのヒント：スマート誘導インターフェース**\nChaBoxのホーム画面はコンテキスト対応です。通常のファイルやフォルダをドラッグすると自動的に「暗号化」がトリガーされ、`.cha`ファイルをドラッグすると「復号化」に切り替わります。"
  - "#### **ヒント：プロセス履歴の理解**\nChaBoxは拡張子を重ねて使用します（例：`.tar.gz.cha`）。`.tar.gz`はアーカイブ/圧縮済みであることを示し、`.cha`は暗号化済みであることを意味します。これにより、データがどう処理されたかの監査証跡が明確になります。"
  - "#### **ヒント：メモの自動保存**\n「セキュアメモ」の編集時、ChaBoxはメモリキャッシュ内に自動的に草案を保存します。アプリが予期せず終了しても、キャッシュがクリアされない限り、作業内容は復元可能です。"
  - "#### **ヒント：専門的なアトミックツール**\n上部のアイコンからは5つの「アトミックツール」（ワイプ、アーカイブ、解凍、暗号化、復号化）にアクセスできます。これらにより、複雑なタスクに対しても各工程を細かく制御できます。"
  - "#### **ヒント：高度なファイルフィルタリング**\n「セキュアボルト」内のフィルターを使用すると、`**/*.txt`のようなパターンでファイルを素早く検索したり、サイズ、変更日時、MIMEタイプで結果を絞り込んだりできます。"
  - "#### **ヒント：パスワード管理の命綱**\nマスターパスワードは復元不可能なため、必ずサイドバーの「ファイルにエクスポート」機能を使用して、安全なUSBドライブにパスワードをバックアップしてください。これが唯一の救済手段です。"
  - "#### **ヒント：インテリジェントなアーカイブ**\n「アーカイブ」ツール使用時、ChaBoxは賢く動作します：テキストファイルは圧縮して容量を節約し、すでに圧縮されている画像や動画などは再圧縮をスキップしてCPU負荷を軽減し、品質を維持します。"

  # --- chapose Advanced CLI Usage ---
  - "#### **CLIのシナジー：chaposeによるシームレス暗号化**\n環境変数 `CHAPOSE_KEYFILE` にキーファイルのパスを設定すれば、毎回手動でキーを指定することなく `chapose encrypt <ファイル>` を直接実行できます。"
  - "#### **CLIのシナジー：ゼロリークアーキテクチャ**\n**chapose**は、TB単位のファイルも扱える純粋なストリーミングアーキテクチャを採用しています。一時的な平文ファイルをディスクに書き出すことなくデータを処理するため、物理ディスクを完全にクリーンに保ちます。"
  - "#### **CLIのシナジー：タスク実行時の強制ワイプ**\n**chapose**を使用する際、`-D` フラグを追加すると、暗号化または復号化が成功した後にソースファイルを自動的かつ安全に消去し、痕跡を一切残しません。"
  - "#### **CLIのシナジー：完全性保護**\n**chapose**は強力な完全性チェックを統合しています。暗号化パッケージがビット反転や悪意ある改ざんを受けた場合、直ちに復号化が失敗するため、データ改ざん攻撃を未然に防ぎます。"
  - "#### **CLIのシナジー：キーファイルの管理**\nパスワード入力だけでなく、`chapose keyfile` を使用して高エントロピーなランダムキーファイルを生成できます。`-p` フラグを使えば、キーファイル自体にもう一層のパスワード保護を追加可能です。"

  # --- ft:filetoolsによる自動化のシナジー ---
  - "#### **自動化ツール：ft:filetoolsについて**\n**ft:filetools**は、同作者による高性能ストリーミングツールです。ファイル検索（Glob）、アーカイブ、安全なワイプ、そして最も重要な**シェルスクプト**に秀でています。複雑なセキュリティワークフローの「脳」となります。"
  - "#### **自動化：安全なバックアップパイプライン**\n`ft archive` を使用して機密ディレクトリをまとめ、パイプで **chapose** に渡して暗号化し、最後に `ft wipe` で中間アーカイブを粉砕します。この全フローは `ft shell` で完全に自動化可能です。"
  - "#### **自動化：ft shellの威力**\n**ft shell**は自動化の魂です。単純なYAMLタスクスクリプトを書くだけで、`ft`のファイル操作と**chapose**の暗号化能力を縫い合わせ、無人運用の生産グレードのセキュリティパイプラインを構築できます。"
  - "#### **自動化：安全な復元フロー**\n暗号化アーカイブ（例：`.tar.gz.cha`）の場合、まず **chapose** で復号化し、次に **ft:filetools** の `unarchive` サブコマンドでストリーミング復元を行います。この組み合わせにより、巨大ディレクトリも高速かつ安全に展開されます。"
  - "#### **自動化：精密な環境クリーニング**\n複雑なタスク終了後、`ft clean` と特定のGlobパターンを使用して、中間生成された断片ファイルを外科手術のように削除します。`rmdir` と組み合わせれば、空のディレクトリ構造も安全に除去され、ストレージを常に清潔に保てます。"
  - "#### **自動化：工業グレードのワイプ**\n**ft:filetools** の `wipe` コマンドは、標準的な削除を遥かに超える破壊能力を提供します。極秘データを処理した後は必ず `wipe` でセクターを上書きし、ラボレベルのデータ復旧を物理的に遮断してください。"

# ------------------------------------------------------------
# 2. 物理的なセキュリティと習慣 (オフラインのベストプラクティス)
# ------------------------------------------------------------
physical_security:
  - "> **オフラインの習慣**：機密操作の後は必ずシステムクリップボードをクリアしてください。設定で「クリップボードの自動クリア」を有効にすると、暴露期間を数秒に短縮できます。"
  - "> **物理バックアップ**：ハードウェアはいずれ故障します。マスターパスワードやリカバリシードは、**非デジタルな紙媒体**に手書きし、耐火・防湿・隠し場所に保管してください。"
  - "> **環境チェック**：マスターパスワード入力や機密ファイル操作時は、周囲を確認してください。カメラや「ショルダーサーフィン」には細心の注意を。"
  - "> **メディアのリフレッシュ**：バックアップに使用するUSBやモバイルHDDは2～3年ごとに「リフレッシュ」してください。別のデバイスにデータを移すことで、「ビット腐敗」やハードウェアの経年劣化を防げます。"
  - "> **コールドスタート防御**：PCから離れる際は必ずChaBoxを閉じてください。これによりメモリワイプがトリガーされ、休止やスリープ中に物理メモリ内にキーが残るのを防ぎます。"
  - "> **古いメディアの処分**：古いドライブやUSBを廃棄・譲渡する際は、ChaBoxの「ワイプ」機能で物理的に複数回上書きしてください。単純な「フォーマット」ではバイナリデータは消えません。"
  - "> **即抜き原則**：最も安全なのは「使ったらすぐ抜く」こと。ネットワーク接続中のPCにバックアップメディアを長時間繋ぎっぱなしにせず、遠隔からの侵入経路を遮断してください。"
  - "> **保管環境**：強力な磁場（スピーカー/電子レンジ）や極端な温度を避けてください。フラッシュや磁気ストレージは環境変動に敏感です。"
  - "> **目立たないラベリング**：物理メディアに「パスワード」「秘密」といったラベルは貼らないでください。意味のないコードを使い、紛失・盗難時の注目度を下げてください。"
  - "> **定期的な検証**：半年ごとに、バックアップメディアから小さなファイルを復号化してデータの健全性を検証してください。緊急時に故障が発覚するのを防ぎます。"
  - "> **エアギャップシステム**：極めて重要な資産には、**永続的にオフライン**のコンピュータでChaBoxやchaposeを使用してください。「エアギャップ（物理的遮断）」はネットワーク攻撃への最強の防御です。"
  - "> **物理キーの分離**：chaposeの `keyfile` 機能を使用する場合、キーファイルと暗号化データを異なるUSBメモリに分けて保存してください。「二重管理」のようなセキュリティを構築できます。"
  - "> **運用管理の知恵：冗長化のルール**：エンタープライズITから学べる、「**バックアップは、何度してもバックアップ**」という原則。冗長性を恐れず、USBやSSDなど異なるメディアで多重保存してください。暗号化データはキーさえ安全なら複製しても安全です。"
  - "> **高度な戦略：オフサイトバックアップ**：少なくとも1つのバックアップは別の場所（オフィスと自宅など）に保管してください。火災や盗難といった単一サイトでの壊滅的イベントからデータを守ります。"
  - "> **ハードウェア保護：書き込み保護**：キーファイルを保管するUSBメモリには、**物理的な書き込み保護スイッチ**付きのモデルを選んでください。復号化時は「読み取り専用」モードにし、マルウェアによるキーファイルの改ざんを物理的に遮断します。"
  - "> **最終手段：物理破壊**：極秘データが入ったドライブが故障し、ソフトウェアで消去不能な場合、捨ててはいけません。ドリルやハンマーでチップを物理的に破壊し、データがハードウェアと共に消滅するようにしてください。"

# ------------------------------------------------------------
# 3. 基礎知識：暗号学 (専門性を高める)
# ------------------------------------------------------------
crypto_lore:
  - "#### **アルゴリズム：ChaCha20-Poly1305**\n著名な暗号学者ダニエル・J・バーンスタインが設計したアルゴリズムです。モバイルや旧型PCでも爆速で動作し、専門家の監査済みで、GoogleやCloudflareといった巨人も信頼を寄せています。"
  - "#### **防御：Argon2idシールド**\nマスターパスワードはそのまま保存されず、Argon2idで「強化」されます。これはPCに計算とメモリ消費を強いるため、ハッカーが高性能GPUで総当たり攻撃を仕掛けるのを極めて困難にします。"
  - "#### **強度：256ビットキー**\nChaBoxは256ビットキーを使用します。これは2の256乗という天文学的な組み合わせ数を示し、太陽が燃え尽きるまで全宇宙のスーパーコンピュータを動かしても全通りを試せません。"
  - "#### **メカニズム：AEAD認証付き暗号化**\nChaBoxはデータを単に「ロック」するだけでなく、「封印」します。暗号化ファイルのたった1バイトが改ざんされても、アプリは変化を検知して復号化を拒否し、悪意あるデータ破損を防ぎます。"
  - "#### **基盤：真の乱数 (CSPRNG)**\nセキュリティは乱数に依存します。ChaBoxはOSの「セキュア乱数生成器」を呼び出し、キーとパラメーターを生成することで、全ての暗号化パッケージをユニークで予測不能なものにします。"
  - "#### **なぜステップを分けるのか？**\nChaBoxは「サイドチャネル攻撃」への防御として、圧縮と暗号化を独立した手順としています。混ぜてしまうと、サイズ変化から内容のシグネチャが漏れる恐れがあるためです。"
  - "#### **コンセプト：サイドチャネル攻撃とは？**\n金庫を割らずに、ダイヤルのクリック音を聞いたり、温度を測ったりして中身を当てるハッカーを想像してください。ChaBoxは実行時間やファイルサイズなどの「外部の手がかり」を排除するように設計されています。"
  - "#### **比較：専門暗号 vs ZIPパスワード**\n標準的なZIP/RAR暗号化は多くの場合、旧式のアルゴリズムによる「おまけ」です。ChaBoxは産業レベルのAEAD標準を用いた専用のセキュリティツールであり、比較にならない防御力を提供します。"
  - "#### **原則：所有者のみアクセス権 (Owner-Only)**\n開発者でさえあなたのデータは開けません。全ての暗号化はローカルで行われ、「バックドア」は皆無であるため、マスターパスワードだけが唯一の鍵です。データ主権は完全にあなたのもの。"
  - "#### **設計：拡張子スタック命名法**\nChaBoxは明確な拡張子スタック（例：`.tar.gz.cha`）戦略をとっています。処理履歴（圧縮・アーカイブ→暗号化）が一目で分かり、監査が容易で、フォーマット誤認によるミスを防げます。"
  - "#### **アイデンティティ：なぜ'.cha'拡張子なのか？**\nChaCha20に由来するだけでなく、この生態系における**オープンな暗号化標準**を表しています。高性能で認証済みストリーミング暗号化の証であり、ChaBoxとchapose間での高い互換性を示します。"
  - "#### **セキュリティ：なぜオープンなアルゴリズムなのか？**\n本当のセキュリティは「隠し味」に依存しません。ChaBoxは標準的で公開されたアルゴリズムを使います。全世界のハッカーや数学者から数十年間攻撃を受けても破られなかったものだけが、真に信頼できる「防弾ガラス」なのです。"
  - "#### **詳細：バイナリレベルの保護**\nChaBoxは管理の利便性からファイル名はそのままですが、内容、メタデータ、構造といった内部情報は全て読み取り不能なバイナリ流に変換されます。キーなしでは、ファイルは行き止まりです。"

