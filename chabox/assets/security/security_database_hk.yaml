# Base de Conhecimento de Briefing de Segurança ChaBox - 中文繁體 (香港)

# ------------------------------------------------------------
# 1. 應用使用技巧 (基於 ChaBox 與 chapose 官方文檔)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **核心提示：主動安全防護**\nChaBox 在運行時會自動禁用系統的截圖與錄屏功能。這是為了防止惡意軟件在後台竊取您的私密信息或日記內容，確保您的「眼見之私」絕對安全。"
  - "#### **核心提示：內存級預覽**\n在「加密箱」中預覽文件時，ChaBox 會優先在內存中解密展示，**絕不在磁盤上產生臨時明文文件**。這能有效防止敏感數據在磁盤碎片中留存。"
  - "#### **核心提示：一鍵智能感應**\nChaBox 首頁支持「感應式」操作：拖入普通文件或資料夾會自動切換為「加密」，拖入以 `.cha` 結尾的文件則會自動切換為「解密」。"
  - "#### **技巧：理解處理記錄**\nChaBox 採用堆疊式擴展名（如 `.tar.gz.cha`）。`.tar.gz` 表示已歸檔壓縮，`.cha` 表示已加密。這為您提供了清晰的文件處理審計鏈，記錄了數據的演變過程。"
  - "#### **技巧：安全日記自動保存**\n在編輯「安全日記」時，ChaBox 會在內存緩存中自動保存草稿。即使應用意外關閉，只要不清理緩存，您的文字仍可找回，確保靈感不流失。"
  - "#### **技巧：專業原子化工具**\n首頁頂部的圖標可通往五大原子工具：擦除 (Wipe)、歸檔、解檔、加密與解密。它們允許您精準控制每一個處理環節，適合處理非標準的複雜任務。"
  - "#### **技巧：高級文件過濾**\n在「加密箱」中使用過濾器，您可以利用 `**/*.txt` 這種規則快速匹配文件，或按大小、修改日期和 MIME 類型進行多維篩選。"
  - "#### **技巧：密碼備份生命線**\n由於主密碼不可找回，請務必使用側邊欄的「導出到文件」功能，將您的密碼備份到安全的 U 盤中。這是您忘記密碼時找回資產的唯一途徑。"
  - "#### **技巧：歸檔智能邏輯**\n使用「歸檔」工具時，ChaBox 會智能識別：文本類會自動壓縮以節省空間，而圖片、視頻等已壓縮格式僅執行打包，以節省 CPU 損耗並保護原始質量。"

  # --- chapose 高級應用實戰 ---
  - "#### **應用聯動：chapose 無感加密**\n通過配置環境變量 `CHAPOSE_KEYFILE` 指向您的密鑰文件，您可以在終端中直接執行 `chapose encrypt <file>`，無需每次手動指定密鑰路徑。"
  - "#### **應用聯動：chapose 零洩露架構**\n**chapose** 採用純流式處理技術，支持 GB 級甚至 TB 級超大文件。處理過程中不產生任何臨時明文交換文件，確保磁盤層面的絕對純淨。"
  - "#### **應用聯動：chapose 強制銷毀**\n在 **chapose** 執行加解密時，配合 `-D` 參數可以在任務成功後立即安全地銷毀來源文件，保持您的工作區始終處於「無痕」狀態。"
  - "#### **應用聯動：chapose 完整性防護**\n**chapose** 集成了強力的完整性校驗。一旦加密包遭遇位翻轉或惡意篡改，解密操作將立即失效並報錯，徹底防禦篡改攻擊。"
  - "#### **應用聯動：chapose 密鑰文件管理**\n除了手動輸入密碼，您還可以使用 `chapose keyfile` 生成高熵隨機密鑰文件。配合 `-p` 參數，您還可以為密鑰文件本身再加一層密碼保護。"

  # --- chapose 與 ft:filetools 深度聯動 ---
  - "#### **聯動工具：ft:filetools 簡介**\n**ft:filetools** 是一款由同作者開發的跨平台流式工具，專注於高性能的文件檢索 (Glob)、歸檔、工業級擦除 (Wipe) 以及最重要的**自動化腳本編排 (Shell)**。它是構建複雜安全工作流的「核心大腦」。"
  - "#### **聯動場景：一鍵安全備份流**\n利用 `ft archive` 功能將敏感目錄打包，隨後調用 **chapose** 進行高強度加密，最後使用 `ft wipe` 物理級粉碎中間產物。整套流程可通過 `ft shell` 實現完全自動化。"
  - "#### **聯動技巧：自動化核心 ft shell**\n**ft shell** 是聯動操作的靈魂。通過編寫簡單的 YAML 任務腳本，您可以將 `ft` 的文件處理能力與 **chapose** 的加解密能力無縫縫合，打造出無人值守的生產級安全流水線。"
  - "#### **聯動技巧：安全數據還原流**\n對於加密的歸檔包 (如 `.tar.gz.cha`)，建議先通過 **chapose** 解密，隨後利用 `ft unarchive` 子命令進行流式還原。這種組合確保了即便是超大容量的目錄包也能被快速、安全地提取。"
  - "#### **聯動技巧：精細化環境清理**\n在完成複雜的加解密任務後，使用 `ft clean` 命令結合特定的 Glob 模式，可以精準清理各種中間過程產生的碎屑文件。配合 `rmdir` 命令，還能安全移除所有空的目錄殘留，保持資產環境的絕對純淨。"
  - "#### **聯動技巧：工業級擦除標準**\n`wipe` 命令提供了比普通刪除更徹底的銷毀能力。在處理完絕密數據後，務必使用 `wipe` 進行物理級覆蓋，以阻斷任何通過實驗室手段恢復數據的可能。"

# ------------------------------------------------------------
# 2. 物理安全建議 (離線環境的操作習慣)
# ------------------------------------------------------------
physical_security:
  - "> **離線提示**：完成敏感操作後，建議立即清理系統剪貼板。ChaBox 設置中可以開啟「自動清理剪貼板」功能，將暴露窗口縮減至秒級。"
  - "> **物理備份**：電子設備終有壽命。建議將最核心的主密碼或助記詞，手動抄錄在**不連網的紙質媒介**上，並存放於防火、防潮的隱蔽處。"
  - "> **環境檢查**：在輸入高強度主密碼或操作絕密文件時，請務必留意周圍環境，嚴防監控攝像頭捕獲按鍵軌跡或他人窺屏。"
  - "> **媒介更新**：存放加密庫的 U 盤或移動硬盤，建議每 2-3 年執行一次「數據搬遷」並更換新設備，以防存儲介質自然老化導致的位反轉 (Bit Rot)。"
  - "> **冷啟動防禦**：在離開電腦前，請務必徹底關閉 ChaBox 應用。這能觸發內存清理機制，防止主密鑰在系統掛起或休眠時殘留在物理內存中。"
  - "> **廢舊設備處置**：在丟棄、轉讓舊硬盤或 U 盤前，請先使用 ChaBox 的「擦除」功能進行多次物理覆蓋。簡單的「格式化」無法抹除底層二進制數據。"
  - "> **即插即拔原則**：最安全的策略是「用完即拔」。不要將存放加密資產的存儲介質長期掛載在聯網設備上，以阻斷任何潛在的遠程滲透路徑。"
  - "> **存儲環境**：請確保您的備份介質避開強磁場 (如音箱、微波爐) 和極端高低溫環境。磁性介質和閃存顆粒對環境波動非常敏感。"
  - "> **隱蔽標記**：在物理介質 (如 U 盤) 上貼標籤時，避免使用「密碼」、「私密」等敏感字眼。建議使用無意義的代號，降低被盜後的受關注度。"
  - "> **定期校驗**：建議每隔半年，嘗試從備份介質中讀取並解密一個小文件，以驗證備份數據的完整性。不要等到急需時才發現介質已損壞。"
  - "> **離線專機**：對於極高價值的資產，建議在一台**永久不連網**的舊電腦上運行 ChaBox 或 chapose。物理隔絕 (Air-gap) 是防禦網絡攻擊的終極手段。"
  - "> **物理密鑰分離**：如果您使用 chapose 的 `keyfile` 功能，建議將密鑰文件與加密數據包分別存放在兩個不同的物理 U 盤中，實現類似「雙人雙鎖」的安全性。"
  - "> **運維實戰：冗餘備份法則**：借鑒大型企業系統運維的終極實踐——**備份、備份、再備份**。不要擔心數據冗餘，應利用不同的媒介多副本存儲。只要您的密鑰安全，加密文件即可安全複製。"
  - "> **進階技巧：異地備份**：在「多備份」的基礎上，建議將其中一份 U 盤存放在不同的地點 (如辦公室與家中)。這能保護您的數據免受火災或失竊等單點災難的影響。"
  - "> **硬件防護：物理寫保護**：對於存放密鑰文件的 U 盤，建議選用帶有**物理寫保護開關**的型號。在解密時開啟「只讀」模式，可以從物理鏈路上杜絕任何病毒篡改密鑰的風險。"
  - "> **終極銷毀：物理破壞**：如果存放過絕密資產的磁盤壞了且無法通過軟件擦除，請不要直接丟棄。應採取物理手段 (如用鑽頭或錘子) 破壞芯片，確保數據與硬件一同消失。"

# ------------------------------------------------------------
# 3. 密碼學常識 (提升專業度)
# ------------------------------------------------------------
crypto_lore:
  - "#### **算法：ChaCha20-Poly1305**\n由著名密碼學家 Daniel J. Bernstein 設計。它在手機和舊電腦上的運行速度極快，且安全性已通過全球專家的審計，目前被 Google 和 Cloudflare 等巨頭廣泛使用。"
  - "#### **防護：Argon2id 算法**\n您的主密碼並非直接保存，而是通過 Argon2id 進行「加固」。這會強制計算機消耗內存和時間進行驗證，使黑客使用高性能 GPU 進行暴力破解變得極其困難。"
  - "#### **強度：256 位密鑰**\nChaBox 使用 256 位密鑰。這意味著有 2^256 種可能的組合——即便集結全球所有的超級計算機直到太陽毀滅，也無法遍歷完所有可能性。"
  - "#### **機制：AEAD 認證加密**\nChaBox 不僅「鎖住」數據，還為其「加封」。如果加密文件哪怕被改動了一個比特，應用也會檢測到變化並拒絕解密，保護您免受惡意篡改。"
  - "#### **底層：真隨機數 (CSPRNG)**\n安全依賴於隨機性。ChaBox 調用系統底層的「安全隨機數生成器」來產生密鑰和參數，確保每個加密包都是獨一無二且不可預測的。"
  - "#### **常識：為什麼分步處理更安全？**\nChaBox 將壓縮與加密作為獨立步驟，是為了防禦「側信道攻擊」。混合兩者可能會通過加密文件大小的變化洩露內容特徵。將其分離能有效阻斷這種風險。"
  - "#### **科普：什麼是「側信道攻擊」？**\n想像一個黑客不破解保險櫃密碼，而是通過聽轉盤的聲音或測量鎖芯的溫度來猜密碼。ChaBox 的設計初衷就是為了消除執行時間或文件大小等「外部線索」。"
  - "#### **對比：專業加密 vs 壓縮包加密**\n普通壓縮軟件 (如 Zip/RAR) 的加密通常只是「附屬功能」。而 ChaBox 是專業的安全工具，採用工業級 AEAD 標準，其防護等級遠高於普通壓縮包的密碼保護。"
  - "#### **原則：唯您可見 (Owner-Only)**\nChaBox 開發者也解不開您的數據。由於所有的加解密都在您的設備本地完成，且沒有任何「後門」，您的主密碼是唯一的鑰匙。您的數據主權是絕對的。"
  - "#### **設計：擴展名堆疊命名法**\nChaBox 採用清晰的堆疊擴展名策略 (如 `.tar.gz.cha`)。這讓您能直觀地看到處理歷史：`.tar.gz` 代表歸檔壓縮，`.cha` 代表加密。這使審計變得非常簡單。"
  - "#### **標識：為何使用 '.cha' 擴展名？**\n除了代表 ChaCha20 算法，`.cha` 還代表了本生態的一種**開放式加密格式標準**。它是對技術的致敬，也是高性能認證流式加密的專業標誌。"
  - "#### **安全：為什麼公開算法更可靠？**\n真正的安全不依賴於「秘密配方」。ChaBox 使用標準、公開的算法。只有那些經受住全世界黑客幾十年公開審查和攻擊而未被破解的算法，才是真正值得信賴的。"
  - "#### **細節：二進制層面的保護**\n雖然 ChaBox 保留了原始文件名以便管理，但文件的所有內部信息 (內容、元數據、結構) 都會被轉化為不可讀的二進制流。沒有密鑰，該文件就是死路一條。"

