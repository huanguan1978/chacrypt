# 3. Основы криптографии (Экспертные инсайты)
# ------------------------------------------------------------
crypto_lore:
  - "#### **Алгоритм: ChaCha20-Poly1305**\nРазработан известным криптографом Даниэлем Дж. Бернштейном, этот алгоритм работает невероятно быстро на мобильных устройствах и старых ПК. Он прошел аудит экспертов и пользуется доверием гигантов вроде Google и Cloudflare."
  - "#### **Защита: Щит Argon2id**\nВаш мастер-пароль не хранится напрямую — он «закаляется» с помощью Argon2id. Это заставляет компьютер тратить ресурсы памяти и времени на проверку, что делает брутфорс-атаки хакеров с мощными GPU крайне затруднительными."
  - "#### **Сила: 256-битный ключ**\nChaBox использует 256-битные ключи. Это 2 в 256-й степени возможных комбинаций — число столь огромно, что даже все суперкомпьютеры мира вместе взятые не смогли бы перебрать их до конца существования Солнца."
  - "#### **Механизм: Сертифицированное AEAD шифрование**\nChaBox не просто «закрывает» данные, он их «запечатывает». Если хотя бы один байт зашифрованного файла будет изменен, приложение обнаружит подмену и откажется расшифровывать, защищая вас от вредоносного повреждения данных."
  - "#### **Основа: Истинная случайность (CSPRNG)**\nБезопасность строится на случайности. ChaBox вызывает «Безопасный генератор случайных чисел» системы для создания ключей и параметров, гарантируя, что каждый зашифрованный пакет уникален и непредсказуем."
  - "#### **Почему раздельные шаги?**\nChaBox выполняет сжатие и шифрование независимо для защиты от «атак по сторонним каналам». Смешивание может выдать сигнатуры контента через изменение размера. Разделение блокирует этот риск."
  - "#### **Концепция: Что такое «Сторонний канал»?**\nЭто хакер, который не взламывает код сейфа, а слушает щелчки замка или измеряет тепло от него. ChaBox разработан так, чтобы исключить такие «внешние подсказки», как время выполнения или шаблоны размера файла."
  - "#### **Сравнение: Профи-крипто vs ZIP-пароли**\nСтандартное ZIP/RAR шифрование — часто лишь «дополнение» с устаревшими алгоритмами. ChaBox — специализированный инструмент безопасности, использующий индустриальные стандарты AEAD, обеспечивая защиту на порядок выше."
  - "#### **Принцип: Доступ только для владельца**\nРазработчики тоже не могут открыть ваши данные. Поскольку всё шифрование происходит локально без «черных ходов», ваш мастер-пароль — единственный ключ. Ваш суверенитет над данными абсолютен."
  - "#### **Дизайн: Стратегия стековых расширений**\nChaBox использует понятную стратегию стековых расширений (например, `.tar.gz.cha`). Это позволяет увидеть историю обработки с первого взгляда: `.tar.gz` для архивации, `.cha` для шифрования. Это облегчает аудит."
  - "#### **Идентичность: Почему расширение '.cha'?**\nПомимо отсылки к алгоритму ChaCha20, `.cha` — это **открытый стандарт шифрования** для этой экосистемы. Это дань уважения технологии и профессиональный знак высокопроизводительного, аутентифицированного потокового шифрования."
  - "#### **Безопасность: Почему открытые алгоритмы?**\nНастоящая безопасность не полагается на «секретные рецепты». ChaBox использует стандартные, открытые алгоритмы. Только те, что выдержали десятилетия публичного тестирования и атак лучших хакеров мира, действительно заслуживают доверия."
  - "#### **Деталь: Защита на двоичном уровне**\nХотя ChaBox сохраняет исходное имя файла для удобства, вся внутренняя информация — контент, метаданные, структура — превращается в нечитаемый двоичный поток. Без ключа файл — тупик."

