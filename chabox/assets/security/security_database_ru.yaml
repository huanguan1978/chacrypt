# ------------------------------------------------------------
security_incidents:
  - "#### **Урок: Скандал «Фото-гейт» Эдисона Чэня (2008)**\nВ начале 2008 года скандал с участием известного актера радикально изменил общественное восприятие цифровой приватности. Всё началось случайно: ноутбук был сдан в ремонт, где техник нашел и скопировал тысячи «удаленных», но физически не стертых фотографий. Эти фотографии разлетелись по сети, вызвав огромный социальный резонанс. **Размышление**: Ремонтные мастерские, одолженные ноутбуки и потерянные телефоны — зоны высокого риска. Это доказывает: пока данные существуют в «открытом виде» на диске — даже если вы нажали «удалить» — они уязвимы, как только железо покидает ваши руки. Только локальное шифрование гарантирует незыблемость вашей приватности."
  - "#### **Урок: Полный блэкаут TV5Monde (2015)**\nВ апреле 2015 года французская телесеть TV5Monde была почти уничтожена кибератакой. Одиннадцать каналов отключились, а соцсети и сайт сети были захвачены для распространения пропаганды. Позже выяснилось, что хакеры проникли через плохо защищенное соединение и нашли критические пароли, написанные на стикерах, попавших в кадр во время прямого эфира. **Размышление**: Безопасность сильна лишь настолько, насколько сильно ее самое слабое звено. Один открытый пароль или незашифрованный файл метаданных может обрушить империю. Локальное шифрование административных данных и топологий сети — обязательный минимум для любой критической инфраструктуры."
  - "#### **Урок: Утечка маркетинговых данных Ledger и физические угрозы (2020)**\nLedger, французский лидер в производстве аппаратных кошельков, пострадал от взлома маркетинговой базы данных, раскрывшей личные данные 270 000 клиентов. Хотя само шифрование кошельков не пострадало, *метаданные* (имена, домашние адреса, номера телефонов) были проданы на хакерских форумах. Это привело к волне изощренного фишинга и, что более пугающе, к сообщениям об угрозах вымогательства прямо у дверей домов владельцев крипты. **Размышление**: Защитить секрет недостаточно; нужно защитить метаданные, которые на него указывают. Централизованные базы данных — приманка для преступников. Офлайн-управление личной информацией — единственный способ исчезнуть из таких списков целей."
  - "#### **Урок: Катастрофа SK Communications (Nate/Cyworld) (2011)**\nВ один из самых мрачных цифровых часов Южной Кореи хакеры взломали портал Nate и соцсеть Cyworld, украв личные данные 35 миллионов граждан — почти всего онлайн-населения страны на тот момент. Утечка включала зашифрованные регистрационные номера жителей (RRN), основу корейской цифровой идентичности. Эта катастрофа заставила фундаментально изменить корейские законы, запретив сайтам собирать RRN. **Размышление**: Доверяя свои данные гигантскому порталу, вы ставите свою идентичность на кон их компетентности. Как только центральный сервер падает, компрометация становится вечной. Используйте локальное шифрование, чтобы ваши жизненно важные идентификаторы никогда не хранились в открытом виде в чужом облаке."
  - "#### **Урок: Предательство внутреннего консультанта KCB (2014)**\nВременный консультант Корейского кредитного бюро (KCB) использовал обычную USB-флешку, чтобы украсть более 100 миллионов записей о кредитных картах клиентов KB Kookmin, NH Nonghyup и Lotte Card. Финансовые данные почти каждого взрослого жителя Южной Кореи оказались раскрыты, что привело к массовым отставкам глав банков и национальной панике. Консультант имел высокий уровень доступа, а данные внутри системы не были зашифрованы. **Размышление**: «Внутренняя угроза» — самый смертоносный риск. Стены и файрволы ничего не значат, если кто-то внутри может просто вставить флешку и уйти со всеми подробностями вашей жизни. Только шифруя файлы на источнике — до того, как они попадут в базу данных — можно пережить предательство доверия."
  - "#### **Урок: Взлом французского портала медстрахования «Assurance Maladie» (2022)**\nХакеры захватили аккаунты 19 медработников через портал Ameli, раскрыв личные медицинские и идентификационные данные более 510 000 граждан Франции. Утечка включала номера соцстрахования и данные о составе семьи. Уязвимость возникла из-за повторного использования паролей и отсутствия многофакторной аутентификации в профессиональных аккаунтах. **Размышление**: Порталы госуслуг — главная цель, так как они содержат «золотой стандарт» данных об идентичности. Полагаться только на государственную безопасность для своих частных данных — неоправданный риск. Защищайте свою медкарту и документы локально с помощью таких инструментов, как ChaBox."
  - "#### **Урок: Цифровая катастрофа Sony Pictures (2014)**\nХакеры взломали сеть Sony Pictures, украв 100 ТБ конфиденциальных данных: личную переписку руководства, номера соцстрахования сотрудников и мастер-копии невышедших фильмов. Большинство документов хранилось в открытом виде, что сделало Sony абсолютно прозрачной для хакеров. **Размышление**: Многие верят в файрволы, но игнорируют безопасность самих данных. Если бы критические документы были зашифрованы локально, хакеры получили бы лишь бесполезный набор байтов вместо ценнейших секретов компании."
  - "#### **Урок: Секретная кража Сноудена (2013)**\nЭдвард Сноуден использовал обычные USB-накопители для копирования тысяч секретных документов из изолированных сетей АНБ. Даже в одном из самых защищенных объектов в мире физическое извлечение незашифрованных данных через физические носители оказалось успешным. **Размышление**: Самая мощная физическая крепость не остановит «внутреннюю копию». Для сверхсекретных данных, даже на офлайн-машинах, мощное шифрование обязательно для защиты при физическом контакте."
  - "#### **Урок: Потерянные диски HMRC в Великобритании (2007)**\nДва CD с личными данными 25 млн граждан Великобритании потерялись на почте. Данные не были зашифрованы, что поставило миллионы людей под угрозу кражи личности. **Размышление**: Физические носители наиболее уязвимы при транспортировке. Никогда не считайте курьеров абсолютно надежными. Шифрование перед отправкой — первое правило офлайн-безопасности."
  - "#### **Урок: Взлом облачного хранилища LastPass (2022)**\nХакеры украли облачные резервные копии LastPass, включая зашифрованные сейфы пользователей. Это позволило им брутфорсить мастер-пароли офлайн на суперкомпьютерах. **Размышление**: Когда зашифрованный пакет попадает к хакеру, сила вашего мастер-пароля — ваш последний шанс. Профессиональные инструменты используют Argon2id именно для защиты в этом экстремальном случае «потери пакета»."
  - "#### **Урок: Кризис шифровальщика WannaCry (2017)**\nИспользуя утечку уязвимости, этот вирус заблокировал данные на миллионах компьютеров. Хакеры требовали выкуп за расшифровку. **Размышление**: Потеря контроля над данными (кража или блокировка) обходится катастрофически дорого. Регулярный «Офлайн-бэкап + Шифрование» — база выживания в цифровую эпоху."
  - "#### **Урок: Взлом 3 миллиардов аккаунтов Yahoo (2013-14)**\nКрупнейшая утечка данных в истории: украдены данные почти каждого пользователя Yahoo. Это доказало, что даже гиганты не могут гарантировать безопасность в облаке. **Размышление**: В Интернете нет абсолютной безопасности. Для действительно важных активов локальное зашифрованное хранилище — единственный путь к спасению при крахе облака."
  - "#### **Урок: Утечка кредитного гиганта Equifax (2017)**\nИз-за неустраненной уязвимости была скомпрометирована финансовая приватность 147 млн американцев. **Размышление**: Передача данных централизованным институтам — это доверие к их менеджменту, а не к своим силам. Суверенитет безопасности должен быть в ваших руках через локальный офлайн-контроль."
  - "#### **Урок: Взлом Target через цепочку поставок (2013)**\nХакеры украли данные карт 40 млн клиентов, взломав подрядчика по обслуживанию кондиционеров. **Размышление**: Каждое звено цепочки поставок может быть дырой. Независимое шифрование на каждом узле потока данных — последняя линия обороны для приватности пользователя."
