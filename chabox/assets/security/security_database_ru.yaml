# ChaBox База знаний по безопасности - Версия на русском языке

# ------------------------------------------------------------
# 1. Профессиональные советы (на основе документации ChaBox, chapose и ft:filetools)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **Совет: Активный щит конфиденциальности**\nChaBox автоматически блокирует системные скриншоты и запись экрана во время работы. Это предотвращает кражу вредоносным ПО ваших личных заметок или конфиденциальных данных, гарантируя, что ваши «глаза» останутся защищенными."
  - "#### **Совет: Просмотр только в оперативной памяти**\nПри просмотре файлов в «Сейфе» ChaBox расшифровывает данные непосредственно в оперативной памяти. **Временные файлы в открытом виде на диске никогда не создаются**, что предотвращает утечку чувствительных следов в фрагментах диска."
  - "#### **Совет: Умный интерфейс взаимодействия**\nГлавный экран ChaBox понимает контекст. Перетаскивание обычных файлов или папок автоматически активирует «Шифровать», а перетаскивание файла `.cha` переключает действие на «Расшифровать»."
  - "#### **Совет: Понимание цепочки обработки**\nChaBox использует стековые расширения (например, `.tar.gz.cha`). `.tar.gz` означает, что файл заархивирован/сжат, а `.cha` — что он зашифрован. Это дает четкую историю обработки ваших данных."
  - "#### **Совет: Автосохранение для заметок**\nПри редактировании «Безопасных заметок» ChaBox сохраняет черновик в кэше памяти. Даже если приложение закроется неожиданно, ваш прогресс можно восстановить, если кэш памяти не был очищен."
  - "#### **Совет: Профессиональные атомарные инструменты**\nИконки в верхней части ведут к пяти «атомарным инструментам»: Стереть, Архивация, Распаковка, Шифрование и Дешифрование. Они обеспечивают детальный контроль над каждым шагом."
  - "#### **Совет: Продвинутая фильтрация файлов**\nИспользуйте фильтр в «Сейфе» для быстрого поиска файлов по шаблонам типа `**/*.txt` или сортировки по размеру, дате изменения и MIME-типу."
  - "#### **Совет: Спасательный круг для пароля**\nПоскольку мастер-пароли восстановить невозможно, обязательно используйте функцию «Экспорт в файл» на боковой панели для резервного копирования на безопасный USB-накопитель. Это ваш единственный путь назад, если вы его забудете."
  - "#### **Совет: Умная архивация**\nПри использовании инструмента «Архивация» ChaBox работает разумно: текстовые файлы сжимаются для экономии места, а уже сжатые форматы (изображения/видео) пропускаются для экономии CPU и сохранения качества."

  # --- Продвинутое использование CLI chapose ---
  - "#### **CLI Синергия: Бесшовное шифрование с chapose**\nУстановив переменную окружения `CHAPOSE_KEYFILE` на путь к вашему файлу ключа, вы можете запускать `chapose encrypt <файл>` напрямую, не указывая ключ каждый раз."
  - "#### **CLI Синергия: Архитектура без утечек**\n**chapose** использует потоковую архитектуру для обработки файлов любого размера (даже терабайтных). Обработка происходит без создания временных файлов в открытом виде, поддерживая чистоту вашего диска."
  - "#### **CLI Синергия: Принудительное удаление**\nПри использовании **chapose** добавьте флаг `-D` для автоматического и безопасного удаления исходного файла после успешного шифрования или дешифрования, не оставляя следов."
  - "#### **CLI Синергия: Защита целостности**\n**chapose** интегрирует строгие проверки целостности. Если зашифрованный пакет подвергнется изменению или злонамеренному воздействию, дешифровка немедленно завершится ошибкой, предотвращая атаки на повреждение данных."
  - "#### **CLI Синергия: Управление ключевыми файлами**\nПомимо ввода паролей, вы можете использовать `chapose keyfile` для генерации высокоэнтропийных случайных файлов ключей. Используйте флаг `-p` для добавления парольной защиты на сам файл ключа."

  # --- Автоматизация с ft:filetools ---
  - "#### **Инструмент автоматизации: ft:filetools**\n**ft:filetools** — это высокопроизводительный потоковый инструмент, созданный тем же автором. Он превосходен в работе с Glob-поиском файлов, архивацией, безопасным удалением и, что важнее всего, **скриптами Shell**. Это «мозг» для сложных задач безопасности."
  - "#### **Автоматизация: Безопасный конвейер резервного копирования**\nИспользуйте `ft archive` для упаковки чувствительной папки, передайте её в **chapose** для шифрования и, наконец, используйте `ft wipe` для уничтожения промежуточного архива. Весь процесс автоматизируется через `ft shell`."
  - "#### **Автоматизация: Сила ft shell**\n**ft shell** — душа автоматизации. Написав простой скрипт на YAML, вы можете объединить возможности `ft` по работе с файлами и криптографическую мощь **chapose**, создав автоматизированный конвейер безопасности промышленного уровня."
  - "#### **Автоматизация: Поток безопасного восстановления**\nДля зашифрованных архивов (например, `.tar.gz.cha`) сначала расшифруйте их с помощью **chapose**, затем используйте `ft unarchive` для потокового восстановления. Эта связка обеспечивает быстрое и безопасное извлечение даже огромных директорий."
  - "#### **Автоматизация: Ювелирная очистка окружения**\nПосле сложных задач используйте `ft clean` с конкретными шаблонами для хирургического удаления промежуточных фрагментов. Сочетайте это с `rmdir` для удаления пустых структур папок, поддерживая ваш диск в идеальной чистоте."
  - "#### **Автоматизация: Промышленное уничтожение данных**\nКоманда `wipe` в **ft:filetools** предлагает уничтожение данных, выходящее далеко за рамки обычного удаления. После обработки секретных данных обязательно используйте `wipe` для перезаписи секторов, чтобы исключить любое восстановление данных на лабораторном уровне."

# ------------------------------------------------------------
# 2. Физическая безопасность и привычки (Лучшие практики офлайн)
# ------------------------------------------------------------
physical_security:
  - "> **Офлайн-привычка**: Всегда очищайте буфер обмена после чувствительных операций. Включите «Автоочистку буфера обмена» в настройках, чтобы сократить время потенциальной экспозиции до секунд."
  - "> **Физическое резервное копирование**: Оборудование не вечно. Запишите мастер-пароль или фразу восстановления на **нецифровом бумажном носителе** и храните его в огнеупорном, сухом и укромном месте."
  - "> **Проверка окружения**: При вводе мастер-пароля или работе с секретными файлами следите за окружением. Остерегайтесь камер или «подглядывания из-за плеча»."
  - "> **Обновление носителей**: USB-накопители или внешние диски нужно «обновлять» каждые 2-3 года. Переносите данные на новое устройство, чтобы предотвратить деградацию бит (Bit Rot) и старение оборудования."
  - "> **Защита от «холодного старта»**: Всегда закрывайте ChaBox перед тем, как отойти от компьютера. Это вызывает очистку памяти, предотвращая сохранение ключей в RAM во время сна или гибернации."
  - "> **Утилизация старых носителей**: Перед выбрасыванием или продажей старого диска используйте функцию «Стереть» в ChaBox для многократной перезаписи. Обычное «Форматирование» не уничтожает двоичные данные."
  - "> **Принцип «Подключил-Использовал-Отключил»**: Самая безопасная стратегия. Никогда не оставляйте резервные носители подключенными к сетевому компьютеру дольше, чем необходимо, чтобы заблокировать пути удаленного вторжения."
  - "> **Условия хранения**: Храните носители подальше от сильных магнитных полей (динамики/микроволновки) и экстремальных температур."
  - "> **Неприметная маркировка**: Избегайте меток типа «Пароли» или «Секрет». Используйте бессмысленные коды, чтобы не привлекать внимания в случае кражи."
  - "> **Регулярная проверка**: Раз в полгода пробуйте расшифровать небольшой файл с резервного носителя, чтобы убедиться в целостности данных. Не ждите чрезвычайной ситуации, чтобы обнаружить поломку диска."
  - "> **Изолированная система (Air-Gapped)**: Для критически важных активов используйте ChaBox или chapose на **постоянно офлайн** компьютере. «Воздушный зазор» — идеальная защита от сетевых атак."
  - "> **Разделение физических ключей**: Если используете функцию `keyfile` в chapose, храните файл ключа и зашифрованные данные на двух разных USB-накопителях. Это создает безопасность по принципу «двух ключей»."
  - "> **Мудрость администрирования: Правила резервирования**: Из корпоративной IT-практики — **Резервируйте, резервируйте и еще раз резервируйте**. Используйте разные носители (USB, SSD и т.д.). Зашифрованные данные можно копировать сколько угодно, пока ключ в безопасности."
  - "> **Продвинутая стратегия: Внеофисное резервирование**: Храните хотя бы одну резервную копию в другом месте (например, на работе и дома). Это защитит данные от катастроф типа пожара или кражи в одном месте."
  - "> **Аппаратная защита: Защита от записи**: Для накопителей с файлами ключей выбирайте модели с **физическим переключателем защиты от записи**. Включайте режим «Только чтение» во время дешифровки, чтобы физически заблокировать вирусы от изменения ключей."
  - "> **Окончательная утилизация: Физическое уничтожение**: Если диск с секретными данными вышел из строя и его невозможно стереть программно, не просто выбрасывайте его. Используйте физическую силу (дрель или молоток), чтобы уничтожить чипы — данные должны умереть вместе с оборудованием."

