# ChaBox 安全简报知识库 - 中文版

# ------------------------------------------------------------
# 1. 应用使用技巧 (基于 ChaBox 与 chapose 官方文档)
# ------------------------------------------------------------
app_usage_tips:
  # --- ChaBox 核心功能与安全特性 ---
  - "#### **核心提示：主动安全防护**\nChaBox 在运行时会自动禁用系统的截图与录屏功能。这是为了防止恶意软件在后台窃取您的私密信息或日记内容，确保您的“眼见之私”绝对安全。"
  - "#### **核心提示：内存级预览**\n在“加密箱”中预览文件时，ChaBox 会优先在内存中解密展示，**绝不在磁盘上产生临时明文文件**。这能有效防止敏感数据在磁盘碎片中留存。"
  - "#### **核心提示：一键智能感应**\nChaBox 首页支持“感应式”操作：拖入普通文件或文件夹会自动切换为“加密”，拖入以 `.cha` 结尾的文件则会自动切换为“解密”。"
  - "#### **技巧：理解处理记录**\nChaBox 采用堆叠式扩展名（如 `.tgz.cha`）。`.tgz` 表示已归档压缩，`.cha` 表示已加密。这为您提供了清晰的文件处理审计链。"
  - "#### **技巧：安全日记自动保存**\n在编辑“安全日记”时，ChaBox 会在内存缓存中自动保存草稿。即使应用意外关闭，只要不清理缓存，您的文字仍可找回。"
  - "#### **技巧：专业原子化工具**\n首页顶部的图标可通往五大原子工具：擦除、归档、解档、加密与解密。它们允许您精准控制每一个处理环节，适合处理非标准的复杂任务。"
  - "#### **技巧：高级文件过滤**\n在“加密箱”中使用过滤器，您可以利用 `**/*.txt` 这种规则快速匹配文件，或按大小、修改日期和 MIME 类型进行多维筛选。"
  - "#### **技巧：密码备份生命线**\n由于密码不可找回，请务必使用侧边栏的“导出到文件”功能，将您的主密码备份到安全的 U 盘中。这是找回资产的唯一途径。"
  - "#### **技巧：归档智能逻辑**\n使用“归档”工具时，ChaBox 会智能识别：文本类会自动压缩，而图片、视频等已压缩格式仅执行打包，以节省 CPU 损耗并保护文件质量。"

  # --- chapose 高级应用实战 ---
  - "#### **应用联动：chapose 无感加密**\n通过配置环境变量 `CHAPOSE_KEYFILE` 指向您的密钥文件，您可以在终端中直接执行 `chapose encrypt <file>`，无需每次手动指定密钥路径。"
  - "#### **应用联动：chapose 零泄露架构**\n**chapose** 采用纯流式处理技术，支持 GB 级甚至 TB 级超大文件。处理过程中不产生任何临时明文交换文件，确保磁盘层面的绝对纯净。"
  - "#### **应用联动：chapose 强制销毁**\n在 **chapose** 执行加解密时，配合 `-D` 参数可以在任务成功后立即物理销毁来源文件，保持您的工作区始终处于“无痕”状态。"
  - "#### **应用联动：chapose 完整性防护**\n**chapose** 集成了强力的完整性校验。一旦加密包遭遇位翻转或恶意篡改，解密操作将立即失效并报错，彻底防御篡改攻击。"
  - "#### **应用联动：chapose 密钥文件管理**\n除了手动输入密码，您可以使用 `chapose keyfile` 生成高熵随机密钥文件。配合 `-p` 参数，您还可以为密钥文件本身再加一层密码保护。"

  # --- chapose 与 ft:filetools 深度联动 ---
  - "#### **联动工具：ft:filetools 简介**\n**ft:filetools** 是一款由同作者开发的跨平台流式工具，专注于高性能的文件检索（Glob）、归档（Archive）、工业级擦除（Wipe）以及最重要的**自动化脚本编排（Shell）**。它是构建复杂安全工作流的“核心大脑”。"
  - "#### **联动场景：一键安全备份流**\n利用 **ft:filetools** 的 `archive` 功能将敏感目录打包，随后调用 **chapose** 进行高强度加密，最后使用 `wipe` 物理级粉碎中间产物。整套流程可通过 `ft shell` 实现完全自动化。"
  - "#### **联动技巧：自动化核心 ft shell**\n**ft shell** 是联动操作的灵魂。通过编写简单的 YAML 任务脚本，您可以将 `ft` 的文件处理能力与 **chapose** 的加解密能力无缝缝合，打造出无人值守的生产级安全流水线。"
  - "#### **联动技巧：安全数据还原流**\n对于加密的归档包（如 `.tgz.cha`），建议先通过 **chapose** 解密，随后利用 **ft:filetools** 的 `unarchive` 子命令进行流式还原。这种组合确保了即便是超大容量的目录包也能被快速、安全地提取。"
  - "#### **联动技巧：精细化环境清理**\n在完成复杂的加解密任务后，使用 **ft:filetools** 的 `clean` 命令结合特定的 Glob 模式，可以精准清理各种中间过程产生的碎屑文件。配合 `rmdir` 命令，还能安全移除所有空的目录残留，保持资产环境的绝对纯净。"
  - "#### **联动技巧：工业级擦除标准**\n**ft:filetools** 的 `wipe` 子命令提供了比普通删除更彻底的销毁能力。在 **chapose** 处理完绝密数据后，务必使用 `wipe` 进行物理级覆盖，以阻断任何通过实验室手段恢复数据的可能。"

# ------------------------------------------------------------
# 2. 物理安全建议 (离线环境的操作习惯)
# ------------------------------------------------------------
physical_security:
  - "> **离线提示**：完成敏感操作后，建议立即清理系统剪贴板。ChaBox 设置中可以开启“自动清理剪贴板”功能，将暴露窗口缩减至秒级。"
  - "> **物理备份**：电子设备终有寿命。建议将最核心的主密码或助记词，手动抄录在**不连网的纸质媒介**上，并存放于防火、防潮的隐蔽处。"
  - "> **环境检查**：在输入高强度主密码或操作绝密文件时，请务必留意周围环境，严防监控摄像头捕获按键轨迹或他人窥屏。"
  - "> **媒介更新**：存放加密库的 U 盘或移动硬盘，建议每 2-3 年执行一次“数据搬迁”并更换新设备，以防存储介质自然老化导致的位反转（Bit Rot）。"
  - "> **冷启动防御**：在离开电脑前，请务必彻底关闭 ChaBox 应用。这能触发内存清理机制，防止主密钥在系统挂起或休眠时残留在物理内存中。"
  - "> **废旧设备处置**：在丢弃、转让旧硬盘或 U 盘前，请先使用 ChaBox 的“擦除”功能进行多次物理覆盖。简单的“格式化”无法抹除底层二进制数据。"
  - "> **即插即拔原则**：最安全的策略是“用完即拔”。不要将存放加密资产的存储介质长期挂载在联网设备上，以阻断任何潜在的远程渗透路径。"
  - "> **存储环境**：请确保您的备份介质避开强磁场（如音箱、微波炉）和极端高低温环境。磁性介质和闪存颗粒对环境波动非常敏感。"
  - "> **隐蔽标记**：在物理介质（如 U 盘）上贴标签时，避免使用“密码”、“私密”等敏感字眼。建议使用无意义的代号，降低被盗后的受关注度。"
  - "> **定期校验**：建议每隔半年，尝试从备份介质中读取并解密一个小文件，以验证备份数据的完整性。不要等到急需时才发现介质已损坏。"
  - "> **离线专机**：对于极高价值的资产，建议在一台**永久不连网**的旧电脑上运行 ChaBox 或 chapose。物理隔绝（Air-gap）是防御网络攻击的终极手段。"
  - "> **物理密钥分离**：如果您使用 chapose 的 `keyfile` 功能，建议将密钥文件与加密数据包分别存放在两个不同的物理 U 盘中，实现类似“双人双锁”的安全性。"
  - "> **运维实战：冗余备份法则**：借鉴大型生产企业系统运维的终极实践——**备份、备份、再备份**。不要担心数据冗余，应利用 U 盘、移动硬盘、光盘等不同媒介进行多副本存储。对于已加密的文件，只要您的主密码或密钥文件不泄露，多一份备份就多一倍资产安全性，绝无后顾之忧。"
  - "> **进阶技巧：异地备份**：在“多备份”的基础上，建议将其中一份 U 盘存放在不同的地点（如办公室与家中）。这样即使遇到火灾或失窃等极端情况，您的核心资产依然有恢复的希望。"
  - "> **硬件防护：物理写保护**：对于存放主密码文件的 U 盘，建议选用带有**物理开关（写保护开关）**的型号。在解密文件时开启“只读”模式，可以从物理链路上杜绝任何病毒篡改或意外删除密钥文件的风险。"
  - "> **终极销毁：物理破坏**：如果存放过绝密资产的磁盘或 U 盘坏了，且无法通过软件擦除，请不要直接丢弃。应采取“物理粉碎”手段（如用锤子砸碎芯片或折断电路板），确保数据随硬件的损坏而永久消失。"

  # ------------------------------------------------------------
  # 3. 密码学常识 (提升专业度)
  # ------------------------------------------------------------
crypto_lore:
  - "#### **算法：ChaCha20-Poly1305**\nChaBox 采用的这一算法由著名的密码学家 Daniel J. Bernstein 设计。它在手机和旧电脑上的运行速度极快，且其安全性已通过全球顶级专家的多年审计，目前被 Google 和 Cloudflare 等巨头广泛使用。"
  - "#### **防护：Argon2id 算法**\n您的主密码不是直接保存的，而是通过 Argon2id 算法进行“加固”。它能让计算机在验证密码时消耗一定的内存和时间，从而极大地增加了黑客使用高性能显卡（GPU）进行暴力破解的难度。"
  - "#### **强度：256 位密钥**\nChaBox 使用 256 位长度的密钥。这个长度意味着有 2 的 256 次方种组合。打个比方，即便集结全球所有的超级计算机不停地运算，直到太阳毁灭也无法遍历完所有可能的密码。"
  - "#### **底层：真随机数 (CSPRNG)**\n加密的安全性很大程度上取决于随机性。ChaBox 调用系统底层的“安全随机数生成器”来产生密钥和加密参数，确保每个加密包都是独一无二且无法被预测的。"
  - "#### **常识：为什么分步处理更安全？**\nChaBox 坚持将压缩与加密作为独立步骤处理，这是为了防御“侧信道攻击”。如果将两者混合在一起，攻击者有时能通过加密文件的大小变化，反向推测出其中的内容特征。将步骤明确分离，能有效阻断这种风险。"
  - "#### **科普：什么是“侧信道攻击”？**\n这就像黑客不直接破解您的保险柜密码，而是通过听转盘的声音、测量锁芯的温度来猜密码。在计算机领域，黑客会通过观察执行时间、耗电量或文件大小等“外部线索”来窃取信息。ChaBox 的设计初衷就是为了消除这些潜在的线索。"
  - "#### **对比：专用加密 vs 压缩包加密**\n普通压缩软件（如 Zip/RAR）的加密通常只是“附属功能”，往往存在算法陈旧或容易泄露文件名等缺陷。而 ChaBox 是专业的安全工具，采用 AEAD 认证加密等工业级标准，其防护等级远高于普通压缩包的密码保护。"
  - "#### **进阶：认证加密 (AEAD) 的优势**\n传统的压缩包加密往往只管“锁住”，不管“被改”。而 ChaBox 的认证加密技术在锁住数据的同时，还为数据加上了“数字封条”。一旦数据在存储过程中被恶意篡改，哪怕只改动了一个比特，解密也会立即失效，确保您拿到的数据 100% 真实。"
  - "#### **原则：唯您可见 (Owner-Only)**\n这是一个关于权力的承诺：ChaBox 开发者也解不开您的数据。由于所有的加解密操作都在您的本地设备上完成，且没有任何“后门”，您的主密码是开启资产的唯一钥匙。这意味着您的数据主权完全掌握在自己手中。"
  - "#### **设计：扩展名堆叠命名法**\nChaBox 采用清晰的堆叠扩展名策略（如 `.tar.gz.cha`）。这种设计能让您直观地看到文件的处理历史：`.tar.gz` 代表已打包压缩，`.cha` 代表已加密。这不仅方便了资产审计，也避免了因误判文件格式而导致的操作错误。"
  - "#### **安全：为什么公开算法更可靠？**\n真正的安全不依赖于“隐藏配方”。ChaBox 使用的算法都是全球公开、透明的。只有经受住全世界黑客和数学家几十年反复攻击测试而未被破解的算法，才是真正值得信赖的“防弹玻璃”。"
  - "#### **细节：二进制层面的保护**\n虽然 ChaBox 保留了原始文件名以便于管理，但在加密过程中，文件的所有内部信息（包括内容、格式、元数据等）都会被转化为不可读的二进制流。除非持有正确密码，否则任何人都无法通过探测文件内部来获取任何有用信息。"
  - "#### **标识：`.cha` 扩展名的由来**\n`.cha` 后缀不仅取自核心算法 **ChaCha20**，它还代表了本生态的一种**开放式加密文件格式**。这种命名方式既是对底层密码学技术的致敬，也标志着该文件采用了高性能、带认证的流式加密标准。它是一种透明且专业的资产标识，确保了在 ChaBox 与 chapose 生态内的完美兼容。"



