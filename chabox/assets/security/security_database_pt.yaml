# 5. Lições de Segurança da História
# ------------------------------------------------------------
security_incidents:
  - "#### **Lição: O escândalo das fotos de Edison Chen (2008)**\nNo início de 2008, um escândalo envolvendo um famoso ator mudou radicalmente a perceção pública sobre a privacidade digital. Tudo começou por acaso: um portátil foi enviado para reparação, onde um técnico encontrou e copiou milhares de fotos 'eliminadas', mas não apagadas fisicamente. Estas espalharam-se online, causando um imenso tumulto social. **Reflexão**: Oficinas de reparação, portáteis emprestados e telemóveis perdidos são zonas de alto risco. Isto prova que enquanto os dados existirem em 'texto simples' num disco — mesmo que tenham sido 'eliminados' — são vulneráveis assim que o hardware sai da sua mão. Apenas a encriptação local garante que a privacidade se mantenha sólida."
  - "#### **Lição: O apagão total da TV5Monde (2015)**\nEm abril de 2015, a rede francesa TV5Monde foi quase destruída por um ciberataque. Onze canais ficaram às escuras, e as redes sociais e o site da rede foram sequestrados para espalhar propaganda. Foi revelado mais tarde que os atacantes entraram através de uma ligação mal protegida e encontraram palavras-passe críticas escritas em post-its durante uma reportagem em direto. **Reflexão**: A segurança é tão forte quanto o seu elo mais fraco. Uma única palavra-passe exposta ou um ficheiro de metadados não encriptado pode derrubar um império. A encriptação local de credenciais administrativas e topologias de rede é uma base obrigatória para qualquer infraestrutura de alto risco."
  - "#### **Lição: A fuga de marketing da Ledger e as ameaças físicas (2020)**\nA Ledger, líder francesa em carteiras de hardware, sofreu uma violação de base de dados de marketing expondo os dados pessoais de 270.000 clientes. Enquanto a sua encriptação permaneceu intacta, os *metadados* (nomes, moradas, números de telefone) foram vendidos em fóruns de hackers. Isto levou a uma onda de phishing sofisticado e, mais aterradoramente, a relatos de ameaças de extorsão em casa contra proprietários de cripto. **Reflexão**: Proteger o seu segredo não é suficiente; deve proteger os metadados que apontam para ele. Bases de dados centralizadas são potes de mel para criminosos. A gestão offline de quem, o quê e onde é a única forma de desaparecer destas listas de alvos."
  - "#### **Lição: O desastre da SK Communications (Nate/Cyworld) (2011)**\nNuma das horas digitais mais sombrias da Coreia do Sul, hackers invadiram o portal Nate e a rede social Cyworld, roubando os dados pessoais de 35 milhões de cidadãos — quase toda a população online da época. A fuga incluiu números de registo de residente (RRN) encriptados, que eram a base da identidade digital coreana. Este desastre forçou uma mudança fundamental na lei coreana, proibindo sites de recolher RRNs. **Reflexão**: Quando entrega os seus dados a um portal gigante, está a apostar a sua identidade na competência deles. Uma vez que um servidor central cai, o compromisso é permanente. Use a encriptação local para garantir que os seus identificadores mais vitais nunca sejam armazenados como texto simples na nuvem de outra pessoa."
  - "#### **Lição: A traição do consultor interno da KCB (2014)**\nUm consultor temporário no Korea Credit Bureau (KCB) usou uma simples pen USB para roubar mais de 100 milhões de registos de cartões de crédito do KB Kookmin, NH Nonghyup e Lotte Card. Quase todos os adultos na Coreia do Sul tiveram os seus dados financeiros expostos, levando à demissão em massa de CEOs de bancos e ao pânico nacional. O consultor tinha acesso de alto nível e os dados não estavam encriptados internamente. **Reflexão**: A 'ameaça interna' é o risco mais letal. Paredes e firewalls não significam nada se alguém de dentro pode simplesmente ligar uma pen e sair com os detalhes da sua vida. Apenas encriptando ficheiros na fonte — antes de chegarem a uma base de dados — pode sobreviver à traição de confiança."
  - "#### **Lição: O ataque ao portal da 'Assurance Maladie' francesa (2022)**\nHackers sequestraram as contas de 19 profissionais de saúde através do portal Ameli, expondo os dados médicos e de identidade privados de mais de 510.000 cidadãos franceses. Isto incluiu números de segurança social e detalhes da estrutura familiar. La vulnerabilidade resultou de palavras-passe reutilizadas e falta de autenticação multifator em contas profissionais. **Reflexão**: Portais de serviço público são alvos preferenciais porque contêm o 'padrão de ouro' dos dados de identidade. Confiar na segurança gerida pelo Estado para os seus dados privados é um risco que não pode pagar. Proteja o seu próprio histórico médico e registos de identidade localmente com ferramentas como o ChaBox."
  - "#### **Lição: O desastre digital da Sony Pictures (2014)**\nHackers invadiram a rede da Sony Pictures, roubando 100TB de dados sensíveis, incluindo e-mails executivos privados, números de segurança social de funcionários e masters de filmes não lançados. A maioria dos documentos internos estava em texto simples, tornando a Sony completamente transparente para os hackers. **Reflexão**: Muitos confiam em firewalls, mas ignoram a segurança dos próprios dados. Se documentos críticos tivessem sido encriptados localmente, os hackers teriam saído com lixo inútil em vez das joias da coroa."
  - "#### **Lição: A extração secreta de Snowden (2013)**\nEdward Snowden usou simples pens USB para copiar milhares de documentos classificados das redes isoladas da NSA. Mesmo numa das instalações mais seguras do mundo, a extração de dados não encriptados através de meios físicos teve sucesso. **Reflexão**: A fortaleza física mais forte não consegue parar uma 'cópia interna'. Para ativos de alto segredo, mesmo em máquinas offline, a encriptação forte é obrigatória para evitar roubo durante contacto físico."
  - "#### **Lição: Discos de dados perdidos do HMRC no Reino Unido (2007)**\nDois CDs contendo os registos pessoais de 25 milhões de cidadãos do Reino Unido desapareceram no correio. Como os dados não estavam encriptados, milhões enfrentaram um risco de roubo de identidade. **Reflexão**: Os meios físicos são mais vulneráveis durante o transporte. Nunca assuma que os estafetas ou outros são fiáveis. Encriptar dados localmente antes de 'saírem' é a primeira regra da segurança offline."
  - "#### **Lição: Brecha do Cofre na Nuvem da LastPass (2022)**\nHackers roubaram dados de backup na nuvem da LastPass, incluindo cópias de cofres encriptados de utilizadores. Isto significou que os hackers podiam tentar força bruta offline usando supercomputadores. **Reflexão**: Quando um pacote encriptado cai nas mãos de um hacker, a sua palavra-passe mestra é a sua última linha de vida. Ferramentas profissionais usam Argon2id especificamente para o proteger neste cenário extremo de 'pacote perdido'."
  - "#### **Lição: A crise do ransomware WannaCry (2017)**\nUsando uma vulnerabilidade filtrada, este vírus bloqueó os dados de inúmeros computadores em todo o mundo. Hackers exigiram resgate para desbloquear ficheiros. **Reflexão**: Uma vez que perde o controlo dos seus dados — sejam roubados ou bloqueados — o custo é devastador. O 'Backup Offline + Encriptação' regular é a base de sobrevivência na era digital."
  - "#### **Lição: Brecha de 3 mil milhões de contas do Yahoo (2013-14)**\nNa maior brecha de dados da história, hackers roubaram informações de quase todos os utilizadores do Yahoo. Provou que nem mesmo gigantes tecnológicos podem garantir a segurança na nuvem. **Reflexão**: Não existe segurança absoluta na Internet. Para ativos que realmente importam, o armazenamento encriptado local é a única forma de sobreviver a um colapso na nuvem."
  - "#### **Lição: Brecha da Equifax (2017)**\nDevido a uma vulnerabilidade não corrigida, a privacidade financeira de 147 milhões de americanos foi exposta. **Reflexão**: Confiar todos os dados sensíveis a uma instituição centralizada significa confiar nas competências de gestão deles mais do que nas suas próprias. A verdadeira soberania de segurança pertence às suas mãos através de controlo local offline."
  - "#### **Lição: Brecha da cadeia de suprimentos da Target (2013)**\nHackers roubaram informações de cartões de crédito de 40 milhões de clientes roubando credenciais de um contratante de HVAC. **Reflexão**: Cada elo na cadeia de suprimentos pode ser uma brecha. A encriptação independente em cada nó do fluxo de dados é a linha de defesa final para a privacidade do utilizador final."
