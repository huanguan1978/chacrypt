# Base de Conhecimento de Briefing de Segurança ChaBox - Edição em Português

# ------------------------------------------------------------
# 1. Dicas Profissionais (Baseado na documentação do ChaBox, chapose & ft:filetools)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **Dica Pro: Escudo de Privacidade Ativo**\nO ChaBox desativa automaticamente capturas de ecrã e gravação de ecrã do sistema enquanto está em execução. Isto impede que malware capture as suas notas privadas ou dados sensíveis, garantindo que a sua privacidade se mantém intacta."
  - "#### **Dica Pro: Visualização Apenas na Memória**\nAo visualizar ficheiros no 'Secure Vault', o ChaBox desencripta os dados diretamente na memória. **Nunca são criados ficheiros de texto simples temporários no disco**, evitando que vestígios sensíveis permaneçam em fragmentos do disco."
  - "#### **Dica Pro: Interface de Indução Inteligente**\nO ecrã inicial do ChaBox é sensível ao contexto. Arrastar ficheiros ou pastas normais dispara automaticamente 'Encriptar', enquanto arrastar um ficheiro `.cha` muda a ação para 'Desencriptar'."
  - "#### **Dica: Compreender os Registos de Processo**\nO ChaBox usa extensões empilhadas (ex: `.tar.gz.cha`). `.tar.gz` indica que o ficheiro está arquivado/comprimido, e `.cha` significa que está encriptado. Isto fornece um rastro de auditoria claro de lo que aconteceu aos seus dados."
  - "#### **Dica: Salvaguarda Automática de Notas**\nAo editar 'Notas Seguras', o ChaBox mantém um rascunho de salvaguarda automática na memória. Mesmo que a aplicação feche inesperadamente, o seu progresso pode ser recuperado, desde que o cache de memória não seja limpo."
  - "#### **Dica: Ferramentas Atómicas Profissionais**\nOs ícones no topo levam a cinco 'Ferramentas Atómicas': Limpar, Arquivar, Desarquivar, Encriptar e Desencriptar. Estas dão controlo granular sobre cada passo, perfeito para tarefas complexas."
  - "#### **Dica: Filtragem Avançada de Ficheiros**\nUse o Filtro no 'Secure Vault' para encontrar rapidamente ficheiros usando padrões como `**/*.txt`, ou refine os resultados por tamanho, data de modificação e tipo MIME."
  - "#### **Dica: A Salvação da Palavra-Passe**\nComo as palavras-passe mestras não podem ser recuperadas, use sempre a funcionalidade 'Exportar para Ficheiro' na barra lateral para copiar a sua palavra-passe para uma pen USB segura. Esta é a sua única forma de recuperação se a esquecer."
  - "#### **Dica: Arquivamento Inteligente**\nAo usar a ferramenta 'Arquivar', o ChaBox é inteligente: comprime ficheiros de texto para poupar espaço, mas ignora a recompressão de formatos já comprimidos (como imagens/vídeos) para poupar CPU e manter a qualidade."

  # --- chapose Advanced CLI Usage ---
  - "#### **Sinergia CLI: Encriptação Fluida do chapose**\nAo configurar a variável de ambiente `CHAPOSE_KEYFILE` para o caminho do seu ficheiro de chave, pode executar `chapose encrypt <ficheiro>` diretamente sem especificar a chave manualmente sempre."
  - "#### **Sinergia CLI: Arquitetura de Fuga Zero**\nO **chapose** usa uma arquitetura de streaming puro para lidar com ficheiros de qualquer tamanho (até TB). Processa dados sem criar trocas temporárias de texto simples, mantendo o seu disco físico limpo."
  - "#### **Sinergia CLI: Limpeza Forçada na Tarefa**\nAo usar the **chapose**, adicione a bandeira `-D` para apagar automática e seguramente o ficheiro de origem após uma encriptação ou desencriptação bem-sucedida, sem deixar rasto."
  - "#### **Sinergia CLI: Proteção de Integridade**\nO **chapose** integra verificações de integridade fortes. Se um pacote encriptado sofrer uma 'inversão de bits' ou adulteração maliciosa, a desencriptação falhará imediatamente para impedir ataques de corrupção de dados."
  - "#### **Sinergia CLI: Gestão de Ficheiros de Chave**\nAlém de digitar palavras-passe, pode usar `chapose keyfile` para gerar ficheiros de chave aleatórios de alta entropia. Use a bandeira `-p` para adicionar uma camada extra de proteção por palavra-passe ao próprio ficheiro de chave."

  # --- Sinergia de Automação com ft:filetools ---
  - "#### **Ferramenta de Automação: ft:filetools**\nO **ft:filetools** é uma ferramenta de streaming de alto desempenho desenhada pelo mesmo autor. Destaca-se na busca glob de ficheiros, arquivamento, limpeza segura e—mais importante—**Scripting de Shell**. É o 'cérebro' para fluxos de trabalho de segurança complexos."
  - "#### **Automação: Pipeline de Backup Seguro**\nUse `ft archive` para agrupar um diretório sensível, envie-o para o **chapose** para encriptação e, finalmente, use `ft wipe` para destruir o arquivo intermédio. Todo este fluxo pode ser totalmente automatizado via `ft shell`."
  - "#### **Automação: O Poder do ft shell**\nO **ft shell** é a alma da automação. Escrevendo um script de tarefas YAML simples, pode unir o manuseamento de ficheiros do `ft` com o poder criptográfico do **chapose** para criar um pipeline de segurança de nível de produção."
  - "#### **Automação: Fluxo de Restauração Seguro**\nPara arquivos encriptados (como `.tar.gz.cha`), desencripte primeiro com o **chapose**, depois use o `ft unarchive` para restauração por streaming. Esta combinação garante que mesmo diretórios maciços sejam extraídos de forma rápida e segura."
  - "#### **Automação: Limpeza Precisa do Ambiente**\nApós tarefas complexas, use o `ft clean` com padrões específicos para remover fragmentos intermédios de forma cirúrgica. Combine-o com `rmdir` para remover estruturas de diretórios vazias, mantendo o seu armazenamento imaculado."
  - "#### **Automação: Limpeza de Grau Industrial**\nO comando `wipe` no **ft:filetools** oferece uma destruição muito além da eliminação padrão. Após processar dados de alto segredo, use o `wipe` para sobrescrever setores e bloquear qualquer recuperação de dados de nível laboratorial."

# ------------------------------------------------------------
# 2. Segurança Física e Hábitos (Melhores Práticas Offline)
# ------------------------------------------------------------
physical_security:
  - "> **Hábito Offline**: Limpe sempre a área de transferência do sistema após operações sensíveis. Ative 'Limpar Área de Transferência Automaticamente' nas definições para reduzir a janela de exposição a segundos."
  - "> **Backup Físico**: O hardware acaba por falhar. Escreva à mão a sua palavra-passe mestra ou seed de recuperação num **meio de papel não digital** e guarde-o num local à prova de fogo, seco e escondido."
  - "> **Verificação de Ambiente**: Ao introduzir a sua palavra-passe mestra ou manusear ficheiros secretos, esteja atento ao seu redor. Cuidado com câmaras ou 'shoulder surfing'."
  - "> **Atualização de Média**: Pens USB ou discos rígidos externos usados para backups devem ser 'atualizados' a cada 2-3 anos. Mova os dados para um novo dispositivo para evitar 'Bit Rot' e o envelhecimento do hardware."
  - "> **Defesa de Cold Start**: Feche sempre a aplicação ChaBox antes de sair do computador. Isto ativa uma limpeza de memória, evitando que as chaves permaneçam na RAM durante a suspensão ou hibernação."
  - "> **Eliminação de Legados**: Antes de descartar ou vender uma unidade antiga, use a função 'Limpar' do ChaBox para múltiplas sobrescritas físicas. Um 'Formatar' simples não apaga dados binários subjacentes."
  - "> **Princípio de Ligar e Desligar**: A estratégia mais segura é 'Ligar, Usar e Desligar'. Nunca deixe os seus suportes de backup ligados a um computador online mais tempo do que o necessário para bloquear caminhos de intrusão remota."
  - "> **Ambiente de Armazenamento**: Mantenha os seus suportes de backup longe de campos magnéticos fortes (como colunas/micro-ondas) e temperaturas extremas. O armazenamento flash e magnético é sensível às flutuações do ambiente."
  - "> **Etiquetagem Discreta**: Evite etiquetas como 'Palavras-passe' ou 'Segredo' nos seus discos físicos. Use códigos sem significado para reduzir a atenção indesejada se perder o dispositivo ou se for roubado."
  - "> **Verificação Regular**: A cada seis meses, tente desencriptar um pequeno ficheiro do seu suporte de backup para verificar se os dados ainda estão intactos. Não espere a uma emergência para descobrir que a unidade falhou."
  - "> **Sistema Aislado (Air-Gapped)**: Para ativos de valor extremamente elevado, use o ChaBox ou chapose num computador **permanentemente offline**. Um 'Air-gap' é a defesa definitiva contra ataques baseados em rede."
  - "> **Separação de Chaves Físicas**: Se usa a funcionalidade `keyfile` do chapose, guarde o ficheiro de chave e os dados encriptados em duas pens USB diferentes. Isto cria uma segurança ao estilo de 'regra de duas pessoas'."
  - "> **Sabedoria Operacional: Regras de Redundância**: Emprestado da TI empresarial—**Backup, Backup e Backup novamente**. Não tema a redundância; use suportes diferentes (USB, SSD, etc.). Dados encriptados podem ser duplicados de forma segura sempre que sua chave estiver segura."
  - "> **Estratégia Avançada: Backup Externo**: Mantenha pelo menos um disco de backup num local diferente (ex: escritório vs casa). Isto protege os seus dados contra eventos extremos como fogo ou roubo num único local."
  - "> **Proteção de Hardware: Proteção contra Escrita**: Para pens USB que guardam ficheiros de chave, escolha modelos com um **interruptor físico de proteção contra escrita**. Ative o modo 'Apenas Leitura' durante a desencriptação para bloquear fisicamente qualquer malware de adulterar as suas chaves."
  - "> **Eliminação Final: Destruição Física**: Se uma unidade que contém dados de alto segredo falhar e não puder ser limpa via software, não a deite apenas fora. Use força física (como um berbequim ou martelo) para destruir os chips, garantindo que os dados morrem com o hardware."

# ------------------------------------------------------------
# 3. Cripto 101 (Insights de Especialistas)
# ------------------------------------------------------------
crypto_lore:
  - "#### **Algoritmo: ChaCha20-Poly1305**\nDesenhado pelo renomado criptógrafo Daniel J. Bernstein, este algoritmo é extremamente rápido em dispositivos móveis e computadores antigos. É auditado por especialistas e confiado por gigantes como Google e Cloudflare."
  - "#### **Defesa: O Escudo Argon2id**\nA sua palavra-passe mestra não é guardada diretamente—é 'endurecida' usando Argon2id. Isto força o computador a gastar memória e tempo a verificá-la, tornando extremamente difícil para hackers usarem GPUs de alta potência para ataques de força bruta."
  - "#### **Força: A Chave de 256 bits**\nO ChaBox usa chaves de 256 bits. Isto significa que existem 2^256 combinações possíveis—um número tão vasto que nem todos os supercomputadores do mundo, correndo até o sol queimar, conseguiriam tentar todas as possibilidades."
  - "#### **Mecanismo: Encriptação Certificada AEAD**\nO ChaBox não apenas 'tranca' os dados; ele 'sela-os'. Se mesmo um único bit de um ficheiro encriptado for adulterado, a aplicação deteta a alteração e recusa a desencriptação, protegendo-o de corrupção maliciosa."
  - "#### **Fundação: Aleatoriedade Real (CSPRNG)**\nA segurança baseia-se na aleatoriedade. O ChaBox chama o 'Gerador de Números Aleatórios Seguros' subjacente do sistema para criar chaves e parâmetros, garantindo que cada pacote encriptado seja único e imprevisível."
  - "#### **Por que passos separados?**\nO ChaBox mantém a compressão e a encriptação como passos independentes para defender contra 'Ataques de Canal Lateral'. Misturá-los pode revelar assinaturas de conteúdo através de alterações de tamanho. Mantê-los separados bloqueia este risco."
  - "#### **Conceito: O que é um 'Canal Lateral'?**\nÉ como um hacker que não parte o código do seu cofre, mas ouve os cliques ou mede o calor da fechadura. O ChaBox é desenhado para eliminar estes 'pistas externas' como tempo de execução ou padrões de tamanho de ficheiro."
  - "#### **Comparação: Cripto Profissional vs. Palavras-passe ZIP**\nA encriptação ZIP/RAR padrão é frequentemente apenas um 'extra' com algoritmos obsoletos. O ChaBox é uma ferramenta de segurança dedicada que usa padrões AEAD de grau industrial, fornecendo proteção muito superior a palavras-passe básicas de arquivo."
  - "#### **Princípio: Acesso Apenas do Proprietário**\nAté os programadores não conseguem desbloquear os seus dados. Como toda a encriptação acontece localmente no seu dispositivo sem 'backdoors', a sua palavra-passe mestra é a única chave. A sua soberania de dados é absoluta."
  - "#### **Design: Estratégia de Extensão Empilhada**\nO ChaBox usa uma estratégia clara de extensão empilhada (ex: `.tar.gz.cha`). Isto permite ver o histórico de processamento num relance: `.tar.gz` para arquivar e `.cha` para encriptar. Torna a auditoria fácil."
  - "#### **Identidade: Por que a extensão '.cha'?**\nAlém do algoritmo ChaCha20, `.cha` representa um **padrão de encriptação de formato aberto** para este ecossistema. É um tributo à tecnologia e um emblema profissional de encriptação de fluxo autenticado de alto desempenho."
  - "#### **Segurança: Por que algoritmos abertos?**\nA verdadeira segurança não depende de 'receitas secretas'. O ChaBox usa algoritmos padrão e abertos. Apenas aqueles que sobreviveram a décadas de escrutínio público e ataques dos melhores hackers do mundo são verdadeiramente confiáveis."
  - "#### **Detalhe: Proteção a Nível Binário**\nEmbora o ChaBox mantenha o nome de ficheiro original para sua conveniência, toda a informação interna—conteúdo, metadados e estrutura—é transformada num fluxo binário ilegível. Sem a chave, o ficheiro é um beco sem saída."

