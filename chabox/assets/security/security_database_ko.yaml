security_incidents:
  - "#### **교훈: 진관희(에디슨 찬) 사진 유출 사건 (2008)**\n2008년 초, 유명 배우가 연루된 스캔들은 디지털 프라이버시에 대한 대중의 인식을 완전히 바꾸어 놓았습니다. 그것은 우연히 시작되었습니다. 수리를 위해 노트북을 보냈는데, 수리 기사가 '삭제'되었지만 물리적으로 완전히 지워지지 않은 수천 장의 사진을 발견하고 복사한 것입니다. 이 사진들은 온라인에 퍼져 엄청난 사회적 파장을 일으켰습니다. **반성**: 수리점, 빌려준 노트북, 분실한 휴대폰은 고위험 지역입니다. 이는 데이터가 디스크에 '평문'으로 존재하는 한, 클릭 한 번으로 '삭제'했더라도 하드웨어가 귀하의 손을 떠나는 순간 위험에 처한다는 것을 증명합니다. 오직 로컬 암호화만이 프라이버시를 확고하게 유지합니다."
  - "#### **교훈: TV5Monde의 완전 블랙아웃 사태 (2015)**\n2015년 4월, 프랑스의 방송사 TV5Monde는 사이버 공격으로 거의 파괴될 뻔했습니다. 11개의 채널이 방송 중단되었고, 방송사의 소셜 미디어와 웹사이트는 선전 도구로 탈취되었습니다. 나중에 밝혀진 바에 따르면, 공격자들은 보안이 취약한 연결을 통해 침입했으며, 생방송 뉴스 리포트 중에 포스트잇에 적힌 중요한 비밀번호들을 발견했습니다. **반성**: 보안은 가장 약한 연결 고리만큼만 강합니다. 단 하나의 노출된 비밀번호나 암호화되지 않은 메타데이터 파일이 제국을 무너뜨릴 수 있습니다. 관리자 자격 증명과 네트워크 토폴로지의 로컬 암호화는 모든 고위험 인프라의 필수 기본 사항입니다."
  - "#### **교훈: Ledger 마케팅 유출 및 물리적 위협 (2020)**\n하드웨어 지갑의 선두주자인 프랑스의 Ledger는 마케팅 데이터베이스 해킹으로 27만 명의 고객 개인 정보가 유출되었습니다. 암호화 자체는 온전했지만, 이름, 집 주소, 전화번호와 같은 *메타데이터*가 해커 포럼에서 판매되었습니다. 이는 정교한 피싱 공격과 더불어, 암호화폐 소유자의 집을 직접 찾아가 협박하는 물리적 위협으로 이어졌습니다. **반성**: 비밀을 보호하는 것만으로는 부족합니다. 그 비밀을 가리키는 메타데이터까지 보호해야 합니다. 중앙 집중식 데이터베이스는 범죄자들에게 꿀단지와 같습니다. 자신의 개인 정보(누가, 무엇을, 어디서)를 오프라인으로 관리하는 것만이 이러한 표적 목록에서 사라지는 유일한 방법입니다."
  - "#### **교훈: SK커뮤니케이션즈(네이트/싸이월드) 대규모 유출 사고 (2011)**\n한국의 디지털 역사에서 가장 어두운 시간 중 하나로, 해커들이 네이트 포털과 싸이월드 소셜 네트워크를 해킹하여 3,500만 명의 개인 정보를 탈취했습니다. 이는 당시 한국 인터넷 인구 거의 전체에 해당합니다. 유출된 정보에는 한국 디지털 신원의 근간인 주민등록번호(RRN) 암호화본이 포함되었습니다. 이 재난으로 인해 한국 법이 근본적으로 바뀌어 웹사이트의 주민등록번호 수집이 금지되었습니다. **반성**: 거대 포털에 데이터를 맡기는 것은 자신의 신원을 그들의 능력에 거는 도박과 같습니다. 중앙 서버가 한 번 무너지면 피해는 영구적입니다. 로컬 암호화를 사용하여 가장 중요한 식별자가 타인의 클라우드에 평문으로 저장되지 않도록 하십시오."
  - "#### **교훈: KCB 내부 컨설턴트의 배신 (2014)**\n코리아크레딧뷰로(KCB)의 파견 직원이 단순한 USB 드라이브를 사용하여 KB국민카드, NH농협카드, 롯데카드로부터 1억 건 이상의 신용카드 정보를 훔쳤습니다. 한국 성인 거의 대부분의 금융 정보가 노출되어 은행 CEO들의 사퇴와 국가적 패닉을 불러왔습니다. 컨설턴트는 높은 수준의 접근 권한을 가졌으며 데이터는 내부적으로 암호화되어 있지 않았습니다. **반성**: '내부자 위협'은 가장 치명적인 위험입니다. 내부의 누군가가 드라이브를 꽂고 귀하의 삶의 세부 정보를 가지고 걸어 나갈 수 있다면 벽과 방화벽은 아무 의미가 없습니다. 데이터베이스에 도달하기 전에 파일 자체를 암호화해야만 신뢰의 배신으로부터 살아남을 수 있습니다."
  - "#### **교훈: 프랑스 건강보험(Assurance Maladie) 포털 해킹 (2022)**\n해커들이 Ameli 포털을 통해 19명의 의료 전문가 계정을 탈취하여 51만 명 이상의 프랑스 시민의 개인 의료 및 신원 데이터를 노출시켰습니다. 여기에는 사회보장번호와 가족 구성 정보가 포함되었습니다. 취약점은 비밀번호 재사용과 전문 계정의 다요소 인증 부재에서 비롯되었습니다. **반성**: 공공 서비스 포털은 신원 데이터의 '표준'을 담고 있어 주요 표적이 됩니다. 국가가 관리하는 보안에 개인 데이터를 전적으로 의존하는 것은 위험합니다. ChaBox와 같은 도구를 사용하여 자신의 의료 기록과 신원 기록을 로컬에서 안전하게 보호하십시오."
  - "#### **교훈: 스노든의 비밀 문서 추출 (2013)**\n에드워드 스노든은 단순한 USB 드라이브를 사용하여 NSA의 에어 갭 네트워크에서 수만 건의 기밀 문서를 복사했습니다. 세계에서 가장 안전한 시설 중 하나에서도 물리적 매체를 통한 암호화되지 않은 데이터의 추출이 성공했습니다. **반성**: 가장 강력한 물리적 요새도 '내부 복사'를 막을 수 없습니다. 일급비밀 자산은 오프라인 기기에서도 물리적 접촉을 통한 도난을 방지하기 위해 강력한 암호화가 필수적입니다."
  - "#### **교훈: 워너크라이(WannaCry) 랜섬웨어 위기 (2017)**\n유출된 취약점을 악용하여 전 세계 수많은 컴퓨터의 데이터를 잠근 바이러스입니다. 해커들은 파일을 잠금 해제하는 대가로 몸값을 요구했습니다. **반성**: 도난이든 잠금이든 데이터에 대한 통제권을 잃는 순간 대가는 파괴적입니다. 정기적인 '오프라인 백업 + 암호화'는 디지털 시대의 생존을 위한 최소한의 기준입니다."
  - "#### **교훈: 야후(Yahoo) 30억 계정 유출 사건 (2013-14)**\n역사상 최대 규모의 데이터 유출 사고로, 해커들이 거의 모든 야후 사용자의 계정 정보를 훔쳤습니다. 이는 거대 IT 기업조차 클라우드 보안을 보장할 수 없음을 증명했습니다. **반성**: 인터넷에 절대적인 보안이란 없습니다. 정말 중요한 자산이라면, 클라우드 붕괴 상황에서도 살아남을 수 있도록 로컬 암호화 저장소를 사용하는 것만이 유일한 방법입니다."
  - "#### **교훈: 신용 평가 거물 Equifax의 유출 사고 (2017)**\n패치되지 않은 취약점으로 인해 1억 4,700만 명의 미국인 금융 프라이버시가 노출되었습니다. **반성**: 모든 민감한 데이터를 중앙 기관에 맡기는 것은 그들의 관리 능력을 자신의 능력보다 더 신뢰한다는 의미입니다. 진정한 보안 주권은 오프라인 로컬 제어를 통해 귀하의 손에 있어야 합니다."
  - "#### **교훈: Target의 소매 공급망 침해 사고 (2013)**\n해커들이 냉난방 공조업체의 자격 증명을 훔쳐 Target의 내망에 침투한 후 4,000만 명의 고객 신용카드 정보를 훔쳤습니다. **반성**: 공급망의 모든 링크가 취약점이 될 수 있습니다. 데이터 흐름의 모든 노드에서 독립적인 암호화를 수행하는 것이 최종 사용자의 프라이버시를 위한 최후의 방어선입니다."
