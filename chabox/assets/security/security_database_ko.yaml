# ChaBox 보안 브리핑 지식 베이스 - 한국어판

# ------------------------------------------------------------
# 1. 전문가 팁 (ChaBox, chapose 및 ft:filetools 문서 기반)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **전문가 팁: 활성 프라이버시 쉴드**\nChaBox는 실행되는 동안 시스템 스크린샷 및 화면 녹화를 자동으로 비활성화합니다. 이는 악성 코드가 귀하의 개인 메모나 민감한 데이터를 캡처하는 것을 방지하여 '개인적인 시선'을 안전하게 보호합니다."
  - "#### **전문가 팁: 메모리 전용 미리보기**\n'Secure Vault'에서 파일을 미리 볼 때 ChaBox는 데이터를 메모리로 직접 복호화합니다. **디스크에는 임시 평문 파일이 생성되지 않으므로**, 민감한 흔적이 디스크 파편에 남는 것을 방지합니다."
  - "#### **전문가 팁: 스마트 유도 인터페이스**\nChaBox 홈 화면은 컨텍스트를 인식합니다. 일반 파일이나 폴더를 끌어다 놓으면 자동으로 '암호화'가 트리거되고, `.cha` 파일을 끌어다 놓으면 작업이 '복호화'로 전환됩니다."
  - "#### **팁: 프로세스 추적 이해**\nChaBox는 중첩된 확장자(예: `.tar.gz.cha`)를 사용합니다. `.tar.gz`는 파일이 아카이브/압축되었음을 나타내고, `.cha`는 암호화되었음을 의미합니다. 이는 데이터에 어떤 일이 일어났는지에 대한 명확한 감사 추적을 제공합니다."
  - "#### **팁: 메모 자동 저장**\n'Secure Notes'를 편집하는 동안 ChaBox는 메모리에 자동 저장 초안을 유지합니다. 앱이 예기치 않게 종료되더라도 메모리 캐시가 지워지지 않는 한 진행 상황을 복구할 수 있습니다."
  - "#### **팁: 전문적인 원자적 도구**\n상단의 아이콘은 다섯 가지 '원자적 도구'로 이어집니다: 삭제(Wipe), 아카이브, 아카이브 해제, 암호화 및 복호화. 이를 통해 모든 단계를 세밀하게 제어할 수 있어 복잡한 작업에 적합합니다."
  - "#### **팁: 고급 파일 필터링**\n'Secure Vault'의 필터를 사용하여 `**/*.txt`와 같은 패턴으로 파일을 빠르게 찾거나 크기, 수정 날짜 및 MIME 유형별로 결과를 좁힐 수 있습니다."
  - "#### **팁: 비밀번호 백업 생명선**\n마스터 비밀번호는 복구할 수 없으므로 항상 사이드바의 '파일로 내보내기' 기능을 사용하여 안전한 USB 드라이브에 비밀번호를 백업하십시오. 비밀번호를 잊어버렸을 때 돌아갈 수 있는 유일한 방법입니다."
  - "#### **팁: 지능형 아카이브**\n'아카이브' 도구를 사용할 때 ChaBox는 영리합니다. 텍스트 파일은 압축하여 공간을 절약하지만 이미 압축된 형식(이미지/비디오 등)은 다시 압축하지 않고 건너뛰어 CPU를 절약하고 품질을 유지합니다."

  # --- chapose Advanced CLI Usage ---
  - "#### **CLI 시너지: chapose의 원활한 암호화**\n환경 변수 `CHAPOSE_KEYFILE`을 키 파일 경로로 설정하면 매번 키를 수동으로 지정하지 않고도 `chapose encrypt <file>`을 직접 실행할 수 있습니다."
  - "#### **CLI 시너지: 유출 제로 아키텍처**\n**chapose**는 순수 스트리밍 아키텍처를 사용하여 모든 크기(TB 단위 포함)의 파일을 처리합니다. 임시 평문 스왑을 생성하지 않고 데이터를 처리하여 실제 디스크를 깨끗하게 유지합니다."
  - "#### **CLI 시너지: 작업 시 강제 삭제**\n**chapose**를 사용할 때 `-D` 플래그를 추가하면 암호화 또는 복호화 성공 후 소스 파일을 자동으로 안전하게 삭제하여 흔적을 남기지 않습니다."
  - "#### **CLI 시너지: 무결성 보호**\n**chapose**는 강력한 무결성 검사를 통합합니다. 암호화된 패키지가 '비트 반전'이나 악의적인 변조를 겪으면 복호화가 즉시 실패하여 데이터 손상 공격을 방지합니다."
  - "#### **CLI 시너지: 키 파일 관리**\n비밀번호 입력 외에도 `chapose keyfile`을 사용하여 엔트로피가 높은 랜덤 키 파일을 생성할 수 있습니다. `-p` 플래그를 사용하여 키 파일 자체에 비밀번호 보호 레이어를 추가할 수 있습니다."

  # --- Automation Synergy with ft:filetools ---
  - "#### **자동화 도구: ft:filetools 소개**\n**ft:filetools**는 동일한 저자가 설계한 고성능 스트리밍 도구입니다. 파일 globbing, 아카이브, 보안 삭제 및 무엇보다 **Shell 스크립팅**에 탁월합니다. 복잡한 보안 워크플로우를 위한 '두뇌'입니다."
  - "#### **자동화: 보안 백업 파이프라인**\n`ft archive`를 사용하여 민감한 디렉토리를 묶고, 이를 **chapose**로 전달하여 암호화한 다음, 마지막으로 `ft wipe`를 사용하여 중간 아카이브를 파쇄합니다. 이 전체 흐름은 `ft shell`을 통해 완전히 자동화될 수 있습니다."
  - "#### **자동화: ft shell의 힘**\n**ft shell**은 자동화의 영혼입니다. 간단한 YAML 작업 스크립트를 작성하여 `ft`의 파일 처리와 **chapose**의 암호화 능력을 결합하여 관리가 필요 없는 전문가급 보안 파이프라인을 구축할 수 있습니다."
  - "#### **자동화: 보안 복구 흐름**\n암호화된 아카이브(예: `.tar.gz.cha`)의 경우 먼저 **chapose**로 복호화한 다음 `ft unarchive`를 사용하여 스트리밍 복구를 수행합니다. 이 조합을 통해 대용량 디렉토리도 빠르고 안전하게 추출할 수 있습니다."
  - "#### **자동화: 정밀한 환경 정리**\n복잡한 작업 후에는 특정 패턴과 함께 `ft clean`을 사용하여 중간 파편을 정밀하게 제거하십시오. `rmdir`과 결합하여 빈 디렉토리 구조를 안전하게 제거하고 저장소를 깨끗하게 유지할 수 있습니다."
  - "#### **자동화: 산업급 삭제**\n**ft:filetools**의 `wipe` 명령은 표준 삭제를 훨씬 뛰어넘는 파괴력을 제공합니다. 일급 비밀 데이터를 처리한 후에는 `wipe`를 사용하여 섹터를 덮어쓰고 실험실 수준의 데이터 복구를 차단하십시오."

# ------------------------------------------------------------
# 2. 물리적 보안 및 습관 (오프라인 베스트 프랙티스)
# ------------------------------------------------------------
physical_security:
  - "> **오프라인 습관**: 민감한 작업 후에는 항상 시스템 클립보드를 지우십시오. 설정에서 '클립보드 자동 지우기'를 활성화하여 노출 시간을 초 단위로 줄이십시오."
  - "> **물리적 백업**: 하드웨어는 결국 고장 납니다. 마스터 비밀번호나 복구 시드를 **디지털이 아닌 종이 매체**에 수동으로 기록하여 내화성 있고 건조하며 숨겨진 장소에 보관하십시오."
  - "> **환경 확인**: 마스터 비밀번호를 입력하거나 비밀 파일을 다룰 때 주변 환경에 주의하십시오. 카메라나 '어깨 너머 훔쳐보기(shoulder surfing)'를 주의하십시오."
  - "> **미디어 리프레시**: 백업에 사용되는 USB 드라이브나 모바일 하드 드라이브는 2-3년마다 '리프레시'해야 합니다. 데이터를 새 기기로 옮겨 '비트 부패(Bit Rot)'와 하드웨어 노후화를 방지하십시오."
  - "> **콜드 스타트 방어**: 컴퓨터를 떠나기 전에 항상 ChaBox 앱을 종료하십시오. 이는 메모리 삭제를 트리거하여 절전 또는 최대 절전 모드 동안 키가 RAM에 남아 있는 것을 방지합니다."
  - "> **레거시 폐기**: 오래된 드라이브를 폐기하거나 판매하기 전에 ChaBox의 'Wipe' 기능을 사용하여 물리적으로 여러 번 덮어쓰십시오. 단순한 '포맷'은 바이너리 데이터를 지우지 않습니다."
  - "> **플러그 앤 풀 원칙**: 가장 안전한 전략은 '연결하고 사용하고 뽑는 것'입니다. 원격 침입 경로를 차단하기 위해 백업 미디어를 온라인 컴퓨터에 필요 이상으로 연결해 두지 마십시오."
  - "> **저장 환경**: 백업 미디어를 강한 자기장(스피커/전자레인지 등)과 극한의 온도에서 멀리하십시오. 플래시 및 자기 저장 장치는 환경 변동에 민감합니다."
  - "> **신중한 라벨링**: 물리적 드라이브에 '비밀번호'나 '비밀'과 같은 라벨을 피하십시오. 기기를 분실하거나 도난당했을 때 원치 않는 주의를 끌지 않도록 의미 없는 코드를 사용하십시오."
  - "> **정기 확인**: 6개월마다 백업 미디어에서 작은 파일을 복호화하여 데이터가 여전히 온전한지 확인하십시오. 비상 상황이 닥칠 때까지 드라이브 고장을 모르고 방치하지 마십시오."
  - "> **에어 갭 시스템**: 매우 가치 있는 자산의 경우 **영구적으로 오프라인** 상태인 컴퓨터에서 ChaBox 또는 chapose를 사용하십시오. '에어 갭(Air-gap)'은 네트워크 기반 공격에 대한 궁극적인 방어입니다."
  - "> **물리적 키 분리**: chapose의 `keyfile` 기능을 사용하는 경우 키 파일과 암호화된 데이터를 두 개의 서로 다른 USB 드라이브에 저장하십시오. 이는 '2인 관리 규정' 스타일의 보안을 생성합니다."
  - "> **운영의 지혜: 중복 규칙**: 기업 IT에서 빌려온 지혜—**백업, 백업, 그리고 또 백업**. 중복을 두려워하지 마십시오. 다양한 미디어(USB, SSD 등)를 사용하십시오. 암호화된 데이터는 키만 안전하다면 복제해도 안전합니다."
  - "> **고급 전략: 원격지 백업**: 최소한 하나의 백업 드라이브를 다른 장소(예: 사무실과 집)에 보관하십시오. 이는 한 장소에서 화재나 도난과 같은 극한 상황이 발생하더라도 데이터를 보호합니다."
  - "> **하드웨어 보호: 쓰기 방지**: 키 파일을 보관하는 USB 드라이브의 경우 **물리적 쓰기 방지 스위치**가 있는 모델을 선택하십시오. 복호화 중에 '읽기 전용' 모드를 활성화하여 악성 코드가 키 파일을 변조하는 것을 물리적으로 차단하십시오."
  - "> **최종 폐기: 물리적 파괴**: 일급 비밀 데이터가 포함된 드라이브가 고장 나 소프트웨어로 지울 수 없는 경우 그냥 버리지 마십시오. 드릴이나 망치와 같은 물리적 힘을 사용하여 칩을 파괴하여 데이터가 하드웨어와 함께 소멸되도록 하십시오."

# ------------------------------------------------------------
# 3. 암호학 101 (전문가 인사이트)
# ------------------------------------------------------------
crypto_lore:
  - "#### **알고리즘: ChaCha20-Poly1305**\n유명한 암호학자 Daniel J. Bernstein이 설계한 이 알고리즘은 모바일과 오래된 PC에서 매우 빠릅니다. 전문가들의 감사를 받았으며 Google 및 Cloudflare와 같은 거대 기업이 신뢰합니다."
  - "#### **방어: Argon2id 쉴드**\n귀하의 마스터 비밀번호는 직접 저장되지 않고 Argon2id를 사용하여 '강화'됩니다. 이는 컴퓨터가 이를 확인하기 위해 메모리와 시간을 소비하게 하여 해커가 고성능 GPU를 사용하여 무차별 대입 공격을 수행하는 것을 매우 어렵게 만듭니다."
  - "#### **강도: 256비트 키**\nChaBox는 256비트 키를 사용합니다. 이는 2^256개의 가능한 조합이 있음을 의미합니다. 태양이 꺼질 때까지 전 세계의 모든 슈퍼컴퓨터를 가동해도 모든 가능성을 시도할 수 없을 정도로 방대한 숫자입니다."
  - "#### **메커니즘: AEAD 인증 암호화**\nChaBox는 데이터를 단순히 '잠그는' 것이 아니라 '밀봉'합니다. 암호화된 파일의 단 한 바이트라도 변조되면 앱이 변경 사항을 감지하고 복호화를 거부하여 악의적인 손상으로부터 귀하를 보호합니다."
  - "#### **기반: 진정한 무작위성 (CSPRNG)**\n보안은 무작위성에 의존합니다. ChaBox는 시스템의 기본 '보안 난수 생성기'를 호출하여 키와 매개변수를 생성함으로써 모든 암호화된 패키지가 고유하고 예측 불가능하도록 보장합니다."
  - "#### **왜 단계가 분리되어 있나요?**\nChaBox는 '부채널 공격(Side-Channel Attacks)'을 방어하기 위해 압축과 암호화를 독립적인 단계로 유지합니다. 이를 혼합하면 크기 변경을 통해 콘텐츠 시그니처가 유출될 수 있습니다. 이를 분리하면 이 위험이 차단됩니다."
  - "#### **개념: '부채널'이란 무엇인가요?**\n금고의 코드를 해킹하는 것이 아니라 클릭 소리를 듣거나 잠금 장치의 온도를 측정하는 해커를 생각해 보십시오. ChaBox는 실행 시간이나 파일 크기 패턴과 같은 '외부 단서'를 제거합니다."
  - "#### **비교: 전문가용 암호화 vs ZIP 비밀번호**\n표준 ZIP/RAR 암호화는 종종 오래된 알고리즘을 사용한 '추가 기능'일 뿐입니다. ChaBox는 산업 등급의 AEAD 표준을 사용하는 전용 보안 도구로, 기본적인 아카이브 비밀번호보다 훨씬 높은 보호 기능을 제공합니다."
  - "#### **원칙: 소유자 전용 액세스**\n개발자조차도 귀하의 데이터를 잠금 해제할 수 없습니다. 모든 암호화가 '백도어' 없이 로컬에서 발생하므로 마스터 비밀번호가 유일한 키입니다. 귀하의 데이터 주권은 절대적입니다."
  - "#### **설계: 중첩 확장자 전략**\nChaBox는 명확한 중첩 확장자 전략(예: `.tar.gz.cha`)을 사용합니다. 이를 통해 처리 이력을 한눈에 볼 수 있습니다. `.tar.gz`는 아카이브를, `.cha`는 암호화를 나타내어 감사를 쉽게 만듭니다."
  - "#### **ID: 왜 '.cha' 확장자인가요?**\nChaCha20 알고리즘을 넘어 `.cha`는 이 에코시스템의 **개방형 형식 암호화 표준**을 나타냅니다. 이는 기술에 대한 헌사이며 고성능 인증 스트리밍 암호화의 전문적인 상징입니다."
  - "#### **보안: 왜 공개 알고리즘을 사용하나요?**\n진정한 보안은 '비밀 레시피'에 의존하지 않습니다. ChaBox는 표준 개방형 알고리즘을 사용합니다. 전 세계 최고의 해커들의 수십 년간의 공개 정밀 조사와 공격에서 살아남은 알고리즘만이 진정으로 신뢰할 수 있습니다."
  - "#### **세부 정보: 바이너리 수준의 보호**\nChaBox는 편의를 위해 원래 파일 이름을 유지하지만 내용, 메타데이터 및 구조를 포함한 모든 내부 정보는 읽을 수 없는 바이너리 스트림으로 변환됩니다. 키 없이는 파일에 접근할 수 없습니다."

