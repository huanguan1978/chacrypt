# Base de conocimientos de sesiones de seguridad ChaBox - Edición en español

# ------------------------------------------------------------
# 1. Consejos profesionales (basados en las docs de ChaBox, chapose y ft:filetools)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **Consejo profesional: Escudo de privacidad activo**\nChaBox desactiva automáticamente las capturas de pantalla y la grabación de pantalla del sistema mientras se ejecuta. Esto evita que el malware capture sus notas privadas o datos confidenciales, garantizando que sus «ojos privados» permanezcan privados."
  - "#### **Consejo profesional: Vista previa solo en memoria**\nAl previsualizar archivos en la «Bóveda segura», ChaBox descifra los datos directamente en la memoria. **Nunca se crean archivos temporales en texto plano en el disco**, lo que evita que queden rastros sensibles en los fragmentos del disco."
  - "#### **Consejo profesional: Interfaz de inducción inteligente**\nLa pantalla de inicio de ChaBox reconoce el contexto. Al arrastrar archivos o carpetas normales, se activa automáticamente «Cifrar», mientras que al arrastrar un archivo `.cha`, la acción cambia a «Descifrar»."
  - "#### **Consejo: Comprender los rastros del proceso**\nChaBox utiliza extensiones apiladas (ej: `.tar.gz.cha`). `.tar.gz` indica que el archivo está archivado/comprimido, y `.cha` significa que está cifrado. Esto proporciona un rastro de auditoría claro de lo que sucedió con sus datos."
  - "#### **Consejo: Guardado automático de notas**\nAl editar «Notas seguras», ChaBox mantiene un borrador de guardado automático en la memoria. Incluso si la aplicación se cierra inesperadamente, su progreso puede recuperarse siempre que no se limpie la memoria caché."
  - "#### **Consejo: Herramientas atómicas profesionales**\nLos iconos de la parte superior conducen a cinco «Herramientas atómicas»: Borrar (Wipe), Archivar, Desarchivar, Cifrar y Descifrar. Estas le brindan un control granular sobre cada paso, perfecto para tareas complejas o no estándar."
  - "#### **Consejo: Filtrado avanzado de archivos**\nUtilice el filtro en la «Bóveda segura» para encontrar archivos rápidamente usando patrones como `**/*.txt`, o reduzca los resultados por tamaño, fecha de modificación y tipo MIME."
  - "#### **Consejo: Salvavidas para la contraseña**\nDado que las contraseñas maestras no se pueden recuperar, utilice siempre la función «Exportar a archivo» en la barra lateral para hacer una copia de seguridad de su contraseña en una unidad USB segura. Es su única forma de recuperar el acceso si la olvida."
  - "#### **Consejo: Archivado inteligente**\nAl usar la herramienta «Archivar», ChaBox es inteligente: comprime los archivos de texto para ahorrar espacio, pero omite la re-compresión de formatos ya comprimidos (como imágenes/videos) para ahorrar CPU y mantener la calidad."

  # --- chapose Advanced CLI Usage ---
  - "#### **Sinergia CLI: Cifrado fluido con chapose**\nAl establecer la variable de entorno `CHAPOSE_KEYFILE` con la ruta de su archivo de clave, puede ejecutar `chapose encrypt <archivo>` directamente sin especificar manualmente la clave cada vez."
  - "#### **Sinergia CLI: Arquitectura de cero fugas**\n**chapose** utiliza una arquitectura de streaming puro para manejar archivos de cualquier tamaño (incluso TB). Procesa los datos sin crear intercambios temporales en texto plano, manteniendo su disco físico limpio."
  - "#### **Sinergia CLI: Borrado forzado tras la tarea**\nAl usar **chapose**, añada el flag `-D` para borrar de forma automática y segura el archivo de origen después de un cifrado o descifrado exitoso, sin dejar rastro."
  - "#### **Sinergia CLI: Protección de integridad**\n**chapose** integra fuertes comprobaciones de integridad. Si un paquete cifrado sufre una alteración maliciosa, el descifrado fallará inmediatamente para evitar ataques de corrupción de datos."
  - "#### **Sinergia CLI: Gestión de archivos de clave**\nMás allá de escribir contraseñas, puede usar `chapose keyfile` para generar archivos de clave aleatorios de alta entropía. Use el flag `-p` para añadir una capa extra de protección por contraseña al propio archivo de clave."

  # --- Automation Synergy with ft:filetools ---
  - "#### **Herramienta de automatización: ft:filetools**\n**ft:filetools** es una herramienta de streaming de alto rendimiento diseñada por el mismo autor. Destaca en la búsqueda de archivos, archivado, borrado seguro y, sobre todo, en **Shell Scripting**. Es el «cerebro» para flujos de trabajo de seguridad complejos."
  - "#### **Automatización: Pipeline de copia de seguridad segura**\nUtilice `ft archive` para empaquetar un directorio sensible, envíelo a **chapose** para cifrarlo y, finalmente, utilice `ft wipe` para triturar el archivo intermedio. Todo este flujo puede automatizarse completamente mediante `ft shell`."
  - "#### **Automatización: El poder de ft shell**\n**ft shell** es el alma de la automatización. Escribiendo un simple script de tareas en YAML, puede unir el manejo de archivos de `ft` con la potencia criptográfica de **chapose** para crear un pipeline de seguridad de calidad industrial."
  - "#### **Automatización: Flujo de restauración seguro**\nPara archivos cifrados (como `.tar.gz.cha`), primero descifre con **chapose** y luego utilice `ft unarchive` para la restauración por streaming. Esta combinación garantiza que incluso los directorios masivos se extraigan de forma rápida y segura."
  - "#### **Automatización: Limpieza precisa del entorno**\nDespués de tareas complejas, utilice `ft clean` con patrones específicos para eliminar quirúrgicamente los fragmentos intermedios. Combínelo con `rmdir` para eliminar de forma segura las estructuras de directorios vacías, manteniendo su almacenamiento impecable."
  - "#### **Automatización: Borrado de grado industrial**\nEl comando `wipe` de **ft:filetools** ofrece una destrucción que va mucho más allá del borrado estándar. Después de procesar datos de alto secreto, utilice `wipe` para sobrescribir los sectores y bloquear cualquier recuperación de datos a nivel de laboratorio."

# ------------------------------------------------------------
# 2. Seguridad física y hábitos (Mejores prácticas fuera de línea)
# ------------------------------------------------------------
physical_security:
  - "> **Hábito fuera de línea**: Limpie siempre el portapapeles del sistema después de operaciones sensibles. Active «Limpieza automática del portapapeles» en los ajustes para reducir la ventana de exposición a segundos."
  - "> **Copia de seguridad física**: El hardware acaba fallando. Escriba a mano su contraseña maestra o semilla de recuperación en un **soporte de papel no digital** y guárdelo en un lugar ignífugo, seco y oculto."
  - "> **Comprobación del entorno**: Al introducir su contraseña maestra o manipular archivos secretos, sea consciente de su entorno. Esté atento a cámaras o al «shoulder surfing»."
  - "> **Refresco de soportes**: Las unidades USB o discos duros externos utilizados para copias de seguridad deben «refrescarse» cada 2 o 3 años. Mueva los datos a un nuevo dispositivo para evitar la degradación de bits (Bit Rot) y el envejecimiento del hardware."
  - "> **Defensa contra el arranque en frío**: Cierre siempre la aplicación ChaBox antes de dejar su computadora. Esto activa una limpieza de memoria, evitando que las llaves permanezcan en la RAM durante la suspensión o hibernación."
  - "> **Eliminación de soportes antiguos**: Antes de desechar o vender una unidad vieja, utilice la función «Borrar» (Wipe) de ChaBox para realizar múltiples sobrescrituras físicas. Un simple «Formateo» no borra los datos binarios."
  - "> **Principio de conectar y desconectar**: La estrategia más segura es «Conectar, usar y desconectar». Nunca deje los soportes de copia de seguridad conectados a una computadora en línea más tiempo del necesario para bloquear las rutas de intrusión remota."
  - "> **Entorno de almacenamiento**: Mantenga sus soportes de copia de seguridad alejados de campos magnéticos fuertes (como altavoces o microondas) y temperaturas extremas. El almacenamiento flash y magnético es sensible a las fluctuaciones del entorno."
  - "> **Etiquetado discreto**: Evite etiquetas como «Contraseñas» o «Secreto» en las unidades físicas. Utilice códigos sin sentido para reducir la atención no deseada si pierde el dispositivo o se lo roban."
  - "> **Verificación regular**: Cada seis meses, intente descifrar un archivo pequeño de su soporte de copia de seguridad para verificar que los datos siguen intactos. No espere a una emergencia para descubrir que la unidad ha fallado."
  - "> **Sistema aislado (Air-Gapped)**: Para activos de muy alto valor, utilice ChaBox o chapose en una computadora **permanentemente fuera de línea**. Un «Air-gap» es la defensa definitiva contra ataques basados en red."
  - "> **Separación física de llaves**: Si utiliza la función `keyfile` de chapose, guarde el archivo de clave y los datos cifrados en dos unidades USB diferentes. Esto crea una seguridad al estilo de la «regla de los dos hombres»."
  - "> **Sabiduría operativa: Reglas de redundancia**: Tomado de la informática empresarial: **Copia de seguridad, copia de seguridad y otra copia de seguridad**. No tema a la redundancia; utilice diferentes soportes (USB, SSD, etc.). Los datos cifrados se pueden duplicar de forma segura siempre que su llave esté segura."
  - "> **Estrategia avanzada: Copia de seguridad externa**: Mantenga al menos una unidad de copia de seguridad en una ubicación diferente (ej: oficina vs. hogar). Esto protege sus datos contra eventos extremos como incendios o robos en un solo lugar."
  - "> **Protección de hardware: Protección contra escritura**: Para las unidades USB que contienen archivos de clave, elija modelos con un **interruptor físico de protección contra escritura**. Active el modo «Solo lectura» durante el descifrado para bloquear físicamente cualquier malware e impedir que manipule sus llaves."
  - "> **Eliminación final: Destrucción física**: Si una unidad que contiene datos de alto secreto falla y no se puede borrar mediante software, no se limite a tirarla. Utilice la fuerza física (como un taladro o un martillo) para destruir los chips, asegurando que los datos mueran con el hardware."

# ------------------------------------------------------------
# 3. Criptografía 101 (Perspectivas de expertos)
# ------------------------------------------------------------
crypto_lore:
  - "#### **Algoritmo: ChaCha20-Poly1305**\nDiseñado por el renombrado criptógrafo Daniel J. Bernstein, este algoritmo es increíblemente rápido en móviles y computadoras antiguas. Ha sido auditado por expertos y cuenta con la confianza de gigantes como Google y Cloudflare."
  - "#### **Defensa: El escudo Argon2id**\nSu contraseña maestra no se almacena directamente; se «endurece» mediante Argon2id. Esto obliga a la computadora a dedicar memoria y tiempo para verificarla, lo que hace extremadamente difícil para los hackers usar GPUs de alta potencia para ataques de fuerza bruta."
  - "#### **Fuerza: La llave de 256 bits**\nChaBox utiliza llaves de 256 bits. Esto significa que hay 2^256 combinaciones posibles, un número tan vasto que ni siquiera todas las supercomputadoras del mundo funcionando hasta que el sol se apague podrían probar todas las posibilidades."
  - "#### **Mecanismo: Cifrado certificado AEAD**\nChaBox no solo «cierra» los datos; los «sella». Si se altera siquiera un bit de un archivo cifrado, la aplicación detecta el cambio y se niega a descifrar, protegiéndole de una corrupción maliciosa."
  - "#### **Fundamento: Aleatoriedad real (CSPRNG)**\nLa seguridad se basa en la aleatoriedad. ChaBox llama al «Generador de números aleatorios seguro» subyacente del sistema para crear llaves y parámetros, asegurando que cada paquete cifrado sea único e impredecible."
  - "#### **¿Por qué pasos separados?**\nChaBox mantiene la compresión y el cifrado como pasos independientes para defenderse de los «Ataques de canal lateral». Mezclarlos puede filtrar firmas de contenido a través de cambios de tamaño. Mantenerlos separados bloquea este riesgo."
  - "#### **Concepto: ¿Qué es un «Canal lateral»?**\nPiense en un hacker que no fuerza el código de una caja fuerte, sino que escucha los clics o mide la temperatura de la cerradura. ChaBox elimina las «pistas externas» como el tiempo de ejecución o los patrones de tamaño de archivo."
  - "#### **Comparación: Criptografía profesional vs. Contraseñas ZIP**\nEl cifrado ZIP/RAR estándar suele ser un «añadido» con algoritmos obsoletos. ChaBox es una herramienta de seguridad dedicada que utiliza estándares AEAD de grado industrial, proporcionando una protección mucho mayor que las contraseñas de archivo básicas."
  - "#### **Principio: Acceso exclusivo del propietario**\nNi siquiera los desarrolladores pueden desbloquear sus datos. Como todo el cifrado ocurre localmente sin «puertas traseras», su contraseña maestra es la única llave. Su soberanía sobre los datos es absoluta."
  - "#### **Diseño: Estrategia de extensión apilada**\nChaBox utiliza una estrategia de extensión apilada clara (ej: `.tar.gz.cha`). Esto le permite ver el historial de procesamiento de un vistazo: `.tar.gz` para el archivado y `.cha` para el cifrado. Facilita la auditoría."
  - "#### **Identidad: ¿Por qué la extensión '.cha'?**\nMás allá del algoritmo ChaCha20, `.cha` representa un **estándar de cifrado de formato abierto** para este ecosistema. Es un tributo a la tecnología y un emblema profesional de cifrado de streaming autenticado de alto rendimiento."
  - "#### **Seguridad: ¿Por qué algoritmos abiertos?**\nLa verdadera seguridad no se basa en «recetas secretas». ChaBox utiliza algoritmos estándar y abiertos. Solo aquellos que han sobrevivido a décadas de escrutinio público y ataques de los mejores hackers del mundo son realmente dignos de confianza."
  - "#### **Detalle: Protección a nivel binario**\nAunque ChaBox conserva el nombre de archivo original para su comodidad, toda la información interna (contenido, metadatos y estructura) se transforma en un flujo binario ilegible. Sin la llave, el archivo es un callejón sin salida."

