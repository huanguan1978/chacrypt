# 5. Lecciones de seguridad de la historia
# ------------------------------------------------------------
security_incidents:
  - "#### **Lección: El escándalo «Photo Gate» de Edison Chen (2008)**\nA principios de 2008, un escándalo que involucró a un actor famoso cambió radicalmente la percepción pública de la privacidad digital. Todo comenzó por accidente: una computadora se envió a reparar, donde un técnico encontró y copió miles de fotos «eliminadas» pero no borradas físicamente. Estas se extendieron por la red, provocando un inmenso tumulto social. **Reflexión**: Los talleres de reparación, las computadoras prestadas y los teléfonos perdidos son zonas de alto riesgo. Esto demuestra que mientras los datos existan en «claro» en un disco —aunque se hayan «eliminado»— son vulnerables en cuanto el hardware deja sus manos. Solo el cifrado local garantiza que la privacidad se mantenga sólida."
  - "#### **Lección: El apagón total de TV5Monde (2015)**\nEn abril de 2015, la cadena francesa TV5Monde fue casi destruida por un ciberataque. Once canales se oscurecieron y las redes sociales y el sitio web de la cadena fueron secuestrados para difundir propaganda. Más tarde se reveló que los atacantes entraron a través de una conexión mal asegurada y encontraron contraseñas críticas escritas en notas adhesivas durante un reportaje de noticias en vivo. **Reflexión**: La seguridad es tan fuerte como su eslabón más débil. Una sola contraseña expuesta o un archivo de metadatos sin cifrar puede derribar un imperio. El cifrado local de las credenciales administrativas y las topologías de red es una base obligatoria para cualquier infraestructura de alto riesgo."
  - "#### **Lección: La filtración de marketing de Ledger y las amenazas físicas (2020)**\nLedger, el líder francés en billeteras de hardware, sufrió una brecha en su base de datos de marketing que expuso los detalles personales de 270.000 clientes. Mientras que su cifrado permaneció intacto, los *metadatos* (nombres, direcciones particulares, números de teléfono) se vendieron en foros de hackers. Esto dio lugar a una ola de phishing sofisticado y, lo que es más aterrador, informes de amenazas de extorsión en el hogar contra propietarios de criptomonedas. **Reflexión**: Proteger su secreto no es suficiente; debe proteger los metadatos que apuntan a él. Las bases de datos centralizadas son botes de miel para los criminales. La gestión fuera de línea de su «quién, qué y dónde» personal es la única forma de desaparecer de estas listas de objetivos."
  - "#### **Lección: El desastre de SK Communications (Nate/Cyworld) (2011)**\nEn una de las horas digitales más oscuras de Corea del Sur, los hackers penetraron en el portal Nate y la red social Cyworld, robando los datos personales de 35 millones de ciudadanos, casi toda la población en línea en ese momento. La filtración incluyó números de registro de residentes (RRN) cifrados, que eran la base de la identidad digital coreana. Este desastre forzó un cambio fundamental en la ley coreana, prohibiendo que los sitios web recopilen RRN. **Reflexión**: Cuando entrega sus datos a un portal gigante, está apostando su identidad a su competencia. Una vez que cae un servidor central, el compromiso es permanente. Use el cifrado local para asegurarse de que sus identificadores más vitales nunca se almacenen como texto plano en la nube de otra persona."
  - "#### **Lección: La traición del consultor interno de KCB (2014)**\nUn consultor temporal en la Oficina de Crédito de Corea (KCB) utilizó una simple unidad USB para robar más de 100 millones de registros de tarjetas de crédito de KB Kookmin, NH Nonghyup y Lotte Card. Casi todos los adultos en Corea del Sur vieron expuestos sus detalles financieros, lo que llevó a la renuncia masiva de los directores ejecutivos de los bancos y al pánico nacional. El consultor tenía acceso de alto nivel y los datos no estaban cifrados internamente. **Reflexión**: La «amenaza interna» es el riesgo más letal. Los muros y firewalls no significan nada si alguien interno puede simplemente conectar una unidad y llevarse los detalles de su vida. Solo cifrando los archivos en el origen —antes de que lleguen a una base de datos — puede sobrevivir a la traición de la confianza."
  - "#### **Lección: El hackeo del portal de la «Assurance Maladie» francesa (2022)**\nLos hackers secuestraron las cuentas de 19 profesionales de la salud a través del portal Ameli, exponiendo los datos médicos y de identidad privados de más de 510.000 ciudadanos franceses. Esto incluyó números de seguridad social y detalles de la estructura familiar. La vulnerabilidad se originó en contraseñas reutilizadas y la falta de autenticación de múltiples factores en las cuentas profesionales. **Reflexión**: Los portales de servicios públicos son objetivos primordiales porque contienen el «estándar de oro» de los datos de identidad. Confiar en la seguridad gestionada por el estado para sus datos privados es un riesgo que no puede permitirse. Asegure su propio historial médico y registros de identidad localmente con herramientas como ChaBox."
  - "#### **Lección: La extracción secreta de Snowden (2013)**\nEdward Snowden usó memorias USB simples para copiar miles de documentos clasificados de las redes aisladas de la NSA. Incluso en una de las instalaciones más seguras del mundo, la extracción de datos sin cifrar mediante medios físicos tuvo éxito. **Reflexión**: La fortaleza física más fuerte no puede detener una «copia interna». Para activos de alto secreto, incluso en máquinas offline, el cifrado fuerte es obligatorio para evitar el robo durante el contacto físico."
  - "#### **Lección: La crisis del ransomware WannaCry (2017)**\nUsando una vulnerabilidad filtrada, este virus bloqueó los datos de innumerables computadoras en todo el mundo. Los hackers exigieron rescate para desbloquear los archivos. **Reflexión**: Una vez que pierde el control de sus datos —ya sea por robo o bloqueo— el costo es devastador. Una «copia de seguridad fuera de línea + cifrado» periódica es la base de la supervivencia en la era digital."
  - "#### **Lección: La brecha de 3.000 millones de cuentas de Yahoo (2013-14)**\nEn la mayor brecha de datos de la historia, los hackers robaron información de casi todos los usuarios de Yahoo. Quedó demostrado que incluso los gigantes tecnológicos no pueden garantizar la seguridad en la nube. **Reflexión**: No hay seguridad absoluta en Internet. Para activos que realmente importan, el almacenamiento cifrado local es la única forma de sobrevivir a un colapso en la nube."
  - "#### **Lección: La filtración del gigante crediticio Equifax (2017)**\nDebido a una vulnerabilidad no parcheada, la privacidad financiera de 147 millones de estadounidenses quedó expuesta. **Reflexión**: Confiar todos los datos sensibles a una institución centralizada significa confiar en sus habilidades de gestión más que en las propias. La verdadera soberanía de seguridad le pertenece mediante el control local fuera de línea."
  - "#### **Lección: La brecha de la cadena de suministro de Target (2013)**\nLos hackers robaron los datos de las tarjetas de crédito de 40 millones de clientes al robar las credenciales de un contratista de climatización. **Reflexión**: Cada eslabón de la cadena de suministro puede ser una brecha. El cifrado independiente en cada nodo del flujo de datos es la última línea de defensa para la privacidad del usuario final."
