# ChaBox Sicherheits-Briefing Wissensdatenbank - Deutsche Ausgabe

# ------------------------------------------------------------
# 1. Profi-Tipps (Basiert auf ChaBox, chapose & ft:filetools Dokumentationen)
# ------------------------------------------------------------
app_usage_tips:
  # --- ChaBox Kernfunktionen und Sicherheitsmerkmale ---
  - "#### **Profi-Tipp: Aktiver Datenschutzschild**\nChaBox deaktiviert während der Laufzeit automatisch System-Screenshots und Bildschirmaufnahmen. Dies verhindert, dass Schadsoftware Ihre privaten Notizen oder sensiblen Daten erfasst, und stellt sicher, dass Ihre „privaten Augen“ privat bleiben."
  - "#### **Profi-Tipp: Nur-Speicher-Vorschau**\nBeim Vorschau-Modus in der „Secure Vault“ entschlüsselt ChaBox Daten direkt in den Arbeitsspeicher. **Es werden niemals temporäre Klartext-Dateien auf dem Datenträger erstellt**, was verhindert, dass sensible Spuren in Fragmenten verbleiben."
  - "#### **Profi-Tipp: Intelligente Schnittstelle**\nDer ChaBox-Startbildschirm ist kontextbewusst. Das Hineinziehen normaler Dateien oder Ordner löst automatisch „Verschlüsseln“ aus, während das Hineinziehen einer `.cha`-Datei die Aktion auf „Entschlüsseln“ umstellt."
  - "#### **Tipp: Prozess-Spuren verstehen**\nChaBox verwendet gestapelte Erweiterungen (z. B. `.tar.gz.cha`). `.tar.gz` zeigt an, dass die Datei archiviert/komprimiert ist, und `.cha` bedeutet, dass sie verschlüsselt ist. Dies bietet einen klaren Prüfpfad."
  - "#### **Tipp: Auto-Save für Notizen**\nWährend Sie „Sichere Notizen“ bearbeiten, speichert ChaBox einen Entwurf automatisch im Arbeitsspeicher. Selbst wenn die App unerwartet schließt, kann Ihr Fortschritt wiederhergestellt werden, solange der Speicher-Cache nicht geleert wurde."
  - "#### **Tipp: Professionelle Atom-Werkzeuge**\nDie Symbole oben führen zu fünf „Atom-Werkzeugen“: Löschen, Archivieren, Entpacken, Verschlüsseln und Entschlüsseln. Sie bieten präzise Kontrolle über jeden Schritt, perfekt für komplexe Aufgaben."
  - "#### **Tipp: Erweiterte Dateifilterung**\nVerwenden Sie den Filter in der „Secure Vault“, um Dateien schnell mit Mustern wie `**/*.txt` zu finden oder Ergebnisse nach Größe, Änderungsdatum und MIME-Typ einzugrenzen."
  - "#### **Tipp: Passwort-Rettungsanker**\nDa Hauptpasswörter nicht wiederhergestellt werden können, verwenden Sie immer die Funktion „In Datei exportieren“ in der Seitenleiste, um Ihr Passwort auf einem sicheren USB-Stick zu sichern. Dies ist Ihr einziger Weg zurück, falls Sie es vergessen."
  - "#### **Tipp: Intelligente Archivierung**\nBeim „Archivieren“ ist ChaBox clever: Textdateien werden komprimiert, um Platz zu sparen, während bereits komprimierte Formate (wie Bilder/Videos) übersprungen werden, um CPU-Leistung und Qualität zu erhalten."

  # --- chapose Erweiterte CLI-Nutzung ---
  - "#### **CLI-Synergie: chapose Nahtlose Verschlüsselung**\nDurch das Setzen der Umgebungsvariable `CHAPOSE_KEYFILE` auf Ihren Schlüsselpfad können Sie `chapose encrypt <Datei>` direkt ausführen, ohne jedes Mal den Schlüssel manuell angeben zu müssen."
  - "#### **CLI-Synergie: Null-Leck-Architektur**\n**chapose** verwendet eine reine Streaming-Architektur, um Dateien jeder Größe (sogar TB) zu verarbeiten. Daten werden ohne temporäre Klartext-Auslagerungen verarbeitet, was Ihren Datenträger sauber hält."
  - "#### **CLI-Synergie: Sicheres Löschen bei Aufgabe**\nVerwenden Sie bei **chapose** die Option `-D`, um die Quelldatei nach erfolgreicher Verschlüsselung oder Entschlüsselung automatisch und sicher zu löschen, ohne Spuren zu hinterlassen."
  - "#### **CLI-Synergie: Integritätsschutz**\n**chapose** integriert starke Integritätsprüfungen. Wenn ein verschlüsseltes Paket einen „Bit-Fehler“ oder böswillige Manipulation erleidet, schlägt die Entschlüsselung sofort fehl, um Datencorruption-Angriffe zu verhindern."
  - "#### **CLI-Synergie: Schlüsseldateiverwaltung**\nStatt Passwörter zu tippen, können Sie mit `chapose keyfile` hoch-entropische Zufalls-Schlüsseldateien generieren. Nutzen Sie die `-p`-Option, um die Schlüsseldatei selbst mit einer zusätzlichen Passwortschicht zu schützen."

  # --- Automatisierung mit ft:filetools ---
  - "#### **Automatisierungstool: ft:filetools**\n**ft:filetools** ist ein hochperformantes Streaming-Tool desselben Entwicklers. Es glänzt bei Glob-Dateisuche, Archivierung, sicherem Löschen und vor allem beim **Shell-Scripting**. Es ist das „Gehirn“ für komplexe Sicherheitsabläufe."
  - "#### **Automatisierung: Sichere Backup-Pipeline**\nVerwenden Sie `ft archive`, um ein sensibles Verzeichnis zu bündeln, leiten Sie es an **chapose** zur Verschlüsselung weiter und löschen Sie das Zwischenarchiv schließlich mit `ft wipe`. Dieser gesamte Ablauf ist über `ft shell` voll automatisierbar."
  - "#### **Automatisierung: Die Kraft von ft shell**\n**ft shell** ist das Herzstück der Automatisierung. Durch einfache YAML-Task-Skripte verknüpfen Sie die Dateiverarbeitung von `ft` mit der Kryptografie-Power von **chapose** für eine wartungsfreie Sicherheits-Pipeline."
  - "#### **Automatisierung: Sichere Wiederherstellung**\nEntschlüsseln Sie verschlüsselte Archive (wie `.tar.gz.cha`) zuerst mit **chapose** und nutzen Sie dann `ft unarchive` für die Streaming-Wiederherstellung. Dies stellt sicher, dass selbst riesige Verzeichnisse schnell und sicher extrahiert werden."
  - "#### **Automatisierung: Präzise Umgebungsreinigung**\nNach komplexen Aufgaben bereinigen Sie mit `ft clean` und spezifischen Mustern chirurgisch Zwischenfragmente. Kombinieren Sie dies mit `rmdir`, um leere Verzeichnisstrukturen zu entfernen und den Speicher sauber zu halten."
  - "#### **Automatisierung: Industriegerechtes Löschen**\nDer Befehl `wipe` in **ft:filetools** geht weit über normales Löschen hinaus. Nach der Verarbeitung geheimer Daten überschreibt `wipe` Sektoren, um jegliche laborbasierte Datenwiederherstellung zu verhindern."

# ------------------------------------------------------------
# 2. Physische Sicherheit & Gewohnheiten (Offline Best Practices)
# ------------------------------------------------------------
physical_security:
  - "> **Offline-Gewohnheit**: Leeren Sie nach sensiblen Vorgängen immer die Zwischenablage. Aktivieren Sie in den Einstellungen 'Zwischenablage automatisch leeren'."
  - "> **Physisches Backup**: Hardware versagt. Notieren Sie Ihr Hauptpasswort oder Ihren Wiederherstellungs-Seed auf einem **nicht-digitalen Papiermedium** und bewahren Sie es an einem feuerfesten, trockenen und versteckten Ort auf."
  - "> **Umgebungs-Check**: Achten Sie bei der Eingabe von Passwörtern oder der Arbeit mit geheimen Dateien auf Ihre Umgebung. Achten Sie auf Kameras oder 'Shoulder Surfing'."
  - "> **Medien-Auffrischung**: USB-Sticks oder externe Festplatten sollten alle 2-3 Jahre 'aufgefrischt' werden. Verschieben Sie Daten auf ein neues Gerät, um 'Bit Rot' und Hardware-Alterung vorzubeugen."
  - "> **Kaltstart-Abwehr**: Schließen Sie ChaBox immer, bevor Sie den Computer verlassen. Dies löst eine Speicherlöschung aus und verhindert, dass Schlüssel im Ruhezustand im RAM verbleiben."
  - "> **Alte Datenträger entsorgen**: Verwenden Sie vor dem Wegwerfen oder Verkauf alter Laufwerke die 'Wipe'-Funktion von ChaBox für mehrfaches Überschreiben. Einfaches 'Formatieren' löscht binäre Daten nicht."
  - "> **Plug-and-Pull-Prinzip**: Die sicherste Strategie ist 'Einstecken, Benutzen, Abziehen'. Lassen Sie Backup-Medien niemals länger als nötig an einem Online-Computer, um Remote-Angriffe zu verhindern."
  - "> **Speicherumgebung**: Halten Sie Backup-Medien von starken Magnetfeldern (Lautsprecher/Mikrowellen) und extremen Temperaturen fern. Flash- und Magnetspeicher reagieren empfindlich."
  - "> **Diskrete Beschriftung**: Vermeiden Sie Beschriftungen wie 'Passwörter' oder 'Geheim' auf Laufwerken. Verwenden Sie bedeutungslose Codes."
  - "> **Regelmäßige Prüfung**: Versuchen Sie alle sechs Monate, eine kleine Datei von Ihrem Backup-Medium zu entschlüsseln, um sicherzustellen, dass die Daten noch intakt sind."
  - "> **Air-Gap-System**: Verwenden Sie für hochsensible Daten ChaBox oder chapose auf einem **dauerhaft offline** gehaltenen Computer. Ein 'Air-Gap' ist die ultimative Verteidigung gegen Netzwerkangriffe."
  - "> **Trennung physischer Schlüssel**: Speichern Sie bei der `keyfile`-Funktion von chapose den Schlüssel und die Daten auf zwei verschiedenen USB-Sticks."
  - "> **运维-Weisheit: Redundanzregeln**: Aus der IT-Unternehmenspraxis—**Backup, Backup und nochmals Backup**. Nutzen Sie unterschiedliche Medien (USB, SSD, etc.). Verschlüsselte Daten können sicher kopiert werden, solange der Schlüssel sicher ist."
  - "> **Strategie: Off-site Backup**: Bewahren Sie mindestens ein Backup an einem anderen Ort auf (Büro vs. Zuhause). Dies schützt vor extremen Ereignissen wie Feuer oder Diebstahl."
  - "> **Hardwareschutz: Schreibschutz**: Wählen Sie für USB-Sticks mit Schlüsseldateien Modelle mit einem **physischen Schreibschutzschalter**. Aktivieren Sie beim Entschlüsseln den 'Nur-Lese-Modus'."
  - "> **Endgültige Entsorgung: Physische Zerstörung**: Wenn ein Laufwerk mit geheimen Daten ausfällt und softwareseitig nicht mehr gelöscht werden kann, zerstören Sie die Chips physisch (Bohrer/Hammer), damit die Daten mit der Hardware sterben."

