# 3. Krypto 101 (Experten-Einblicke)
# ------------------------------------------------------------
crypto_lore:
  - "#### **Algorithmus: ChaCha20-Poly1305**\nEntwickelt vom Kryptografen Daniel J. Bernstein, ist dieser Algorithmus extrem schnell auf mobilen Geräten und älteren PCs. Er ist von Experten geprüft und wird von Giganten wie Google und Cloudflare vertraut."
  - "#### **Verteidigung: Der Argon2id-Schild**\nIhr Hauptpasswort wird nicht direkt gespeichert, sondern mit Argon2id 'gehärtet'. Dies zwingt den Computer, Arbeitsspeicher und Zeit für die Überprüfung aufzuwenden, was Brute-Force-Angriffe mittels leistungsstarker GPUs extrem erschwert."
  - "#### **Stärke: Der 256-Bit-Schlüssel**\nChaBox verwendet 256-Bit-Schlüssel. Dies bedeutet 2^256 Kombinationen — eine Zahl so riesig, dass selbst alle Supercomputer der Welt bis zum Verlöschen der Sonne nicht jede Möglichkeit ausprobieren könnten."
  - "#### **Mechanismus: AEAD-zertifizierte Verschlüsselung**\nChaBox 'verschließt' Daten nicht nur; sie 'versiegelt' sie. Wenn auch nur ein Byte manipuliert wird, erkennt die App dies und verweigert die Entschlüsselung, um vor böswilliger Korruption zu schützen."
  - "#### **Fundament: Wahre Zufälligkeit (CSPRNG)**\nSicherheit basiert auf Zufall. ChaBox ruft den 'sicheren Zufallszahlengenerator' des Systems auf, um Schlüssel und Parameter zu erzeugen, was jedes verschlüsselte Paket einzigartig macht."
  - "#### **Warum getrennte Schritte?**\nChaBox trennt Kompression und Verschlüsselung, um 'Seitenkanalangriffen' entgegenzuwirken. Das Mischen könnte Signaturen durch Größenänderungen verraten; die Trennung verhindert dieses Risiko."
  - "#### **Konzept: Was ist ein 'Seitenkanal'?**\nDenken Sie an einen Hacker, der nicht den Tresor knackt, sondern auf das Klicken der Schlösser lauscht. ChaBox eliminiert 'externe Hinweise' wie Ausführungszeit oder Dateigrößenmuster."
  - "#### **Vergleich: Pro Crypto vs. ZIP-Passwörter**\nStandard-ZIP/RAR-Verschlüsselung ist oft nur ein 'Zusatz' mit veralteten Algorithmen. ChaBox ist ein dediziertes Sicherheitswerkzeug mit AEAD-Standards, das weit höheren Schutz bietet als einfache Archivpasswörter."
  - "#### **Prinzip: Nur-Besitzer-Zugriff**\nSelbst Entwickler können Ihre Daten nicht entschlüsseln. Da alle Verschlüsselung lokal erfolgt und es keine 'Hintertür' gibt, ist Ihr Passwort der einzige Schlüssel. Ihre Datensouveränität ist absolut."
  - "#### **Design: Gestapelte Erweiterungsstrategie**\nChaBox verwendet eine klare Strategie (z. B. `.tar.gz.cha`). Dies zeigt die Verarbeitungshistorie auf einen Blick: `.tar.gz` für Archivierung und `.cha` für Verschlüsselung. Das erleichtert die Prüfung."
  - "#### **Identität: Warum die '.cha'-Erweiterung?**\nNeben dem Algorithmus ChaCha20 repräsentiert `.cha` einen **offenen Verschlüsselungsstandard** für dieses Ökosystem. Es ist eine Hommage an die Technik und ein professionelles Zeichen für performante, authentifizierte Streaming-Verschlüsselung."
  - "#### **Sicherheit: Warum offene Algorithmen?**\nEchte Sicherheit stützt sich nicht auf 'Geheimrezepte'. ChaBox nutzt standardisierte, offene Algorithmen. Nur solche, die Jahrzehnte der öffentlichen Prüfung überstanden haben, sind wirklich vertrauenswürdig."
  - "#### **Detail: Binärer Schutz**\nObwohl ChaBox den Dateinamen beibehält, werden alle internen Informationen—Inhalt, Metadaten, Struktur—in einen unlesbaren Binärstrom verwandelt. Ohne Schlüssel ist die Datei eine Sackgasse."

