# ChaBox Security Briefing Knowledge Base - English Edition

# ------------------------------------------------------------
# 1. Pro Tips (Based on ChaBox, chapose & ft:filetools Docs)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **Pro Tip: Active Privacy Shield**\nChaBox automatically disables system screenshots and screen recording while running. This prevents malware from capturing your private notes or sensitive data, ensuring your 'private eyes' stay private."
  - "#### **Pro Tip: Memory-Only Preview**\nWhen previewing files in the 'Secure Vault', ChaBox decrypts data directly into memory. **No temporary plaintext files are ever created on disk**, preventing sensitive traces from lingering in disk fragments."
  - "#### **Pro Tip: Smart Induction Interface**\nThe ChaBox home screen is context-aware. Dragging in regular files or folders automatically triggers 'Encrypt', while dragging in a `.cha` file switches the action to 'Decrypt'."
  - "#### **Tip: Understanding Process Trails**\nChaBox uses stacked extensions (e.g., `.tar.gz.cha`). `.tar.gz` indicates the file is archived/compressed, and `.cha` means it is encrypted. This provides a clear audit trail of what happened to your data."
  - "#### **Tip: Auto-Save for Notes**\nWhile editing 'Secure Notes', ChaBox keeps an auto-save draft in memory. Even if the app closes unexpectedly, your progress can be recovered as long as the memory cache isn't cleared."
  - "#### **Tip: Professional Atomic Tools**\nThe icons at the top lead to five 'Atomic Tools': Wipe, Archive, Unarchive, Encrypt, and Decrypt. These give you granular control over every step, perfect for complex or non-standard tasks."
  - "#### **Tip: Advanced File Filtering**\nUse the Filter in the 'Secure Vault' to quickly find files using patterns like `**/*.txt`, or narrow down results by size, modification date, and MIME type."
  - "#### **Tip: Password Backup Lifeline**\nSince master passwords cannot be recovered, always use the 'Export to File' feature in the sidebar to back up your password to a secure USB drive. This is your only way back if you forget it."
  - "#### **Tip: Intelligent Archiving**\nWhen using the 'Archive' tool, ChaBox is smart: it compresses text files to save space but skips re-compressing already-compressed formats (like images/videos) to save CPU and maintain file quality."

  # --- chapose Advanced CLI Usage ---
  - "#### **CLI Synergy: chapose Seamless Encryption**\nBy setting the `CHAPOSE_KEYFILE` environment variable to your key file path, you can run `chapose encrypt <file>` directly without manually specifying the key every time."
  - "#### **CLI Synergy: Zero-Leak Architecture**\n**chapose** uses a pure streaming architecture to handle files of any size (even TBs). It processes data without creating temporary plaintext swaps, keeping your physical disk clean."
  - "#### **CLI Synergy: Force Wipe on Task**\nWhen using **chapose**, add the `-D` flag to automatically and securely wipe the source file after a successful encryption or decryption, leaving no trace behind."
  - "#### **CLI Synergy: Integrity Protection**\n**chapose** integrates strong integrity checks. If an encrypted package suffers a 'bit flip' or malicious tampering, decryption will fail immediately to prevent data corruption attacks."
  - "#### **CLI Synergy: Keyfile Management**\nBeyond typing passwords, you can use `chapose keyfile` to generate high-entropy random key files. Use the `-p` flag to add an extra layer of password protection to the key file itself."

  # --- Automation Synergy with ft:filetools ---
  - "#### **Automation Tool: Meet ft:filetools**\n**ft:filetools** is a high-performance streaming tool designed by the same author. It excels at file globbing, archiving, secure wiping, and—most importantly—**Shell Scripting**. It is the 'brain' for complex security workflows."
  - "#### **Automation: Secure Backup Pipeline**\nUse `ft archive` to bundle a sensitive directory, pipe it to **chapose** for encryption, and finally use `ft wipe` to shred the intermediate archive. This entire flow can be fully automated via `ft shell`."
  - "#### **Automation: The Power of ft shell**\n**ft shell** is the soul of automation. By writing a simple YAML task script, you can stitch `ft`'s file handling with **chapose**'s crypto power to create a hands-off, production-grade security pipeline."
  - "#### **Automation: Secure Restoration Flow**\nFor encrypted archives (like `.tar.gz.cha`), first decrypt with **chapose**, then use `ft unarchive` for streaming restoration. This combo ensures even massive directories are extracted quickly and safely."
  - "#### **Automation: Precision Environment Cleaning**\nAfter complex tasks, use `ft clean` with specific patterns to surgically remove intermediate fragments. Pair it with `rmdir` to safely remove empty directory structures, keeping your storage pristine."
  - "#### **Automation: Industrial-Grade Wiping**\nThe `wipe` command in **ft:filetools** offers destruction far beyond standard deletion. After processing top-secret data, use `wipe` to overwrite sectors and block any laboratory-level data recovery."

# ------------------------------------------------------------
# 2. Physical Security & Habits (Offline Best Practices)
# ------------------------------------------------------------
physical_security:
  - "> **Offline Habit**: Always clear your system clipboard after sensitive operations. Enable 'Auto-Clear Clipboard' in settings to reduce the exposure window to seconds."
  - "> **Physical Backup**: Hardware eventually fails. Hand-write your master password or recovery seed on a **non-digital paper medium** and store it in a fireproof, dry, and hidden place."
  - "> **Environment Check**: When entering your master password or handling secret files, be aware of your surroundings. Watch out for cameras or 'shoulder surfing'."
  - "> **Media Refresh**: USB drives or mobile hard drives used for backups should be 'refreshed' every 2-3 years. Move data to a new device to prevent 'Bit Rot' and hardware aging."
  - "> **Cold Start Defense**: Always close the ChaBox app before leaving your computer. This triggers a memory wipe, preventing keys from lingering in RAM during sleep or hibernation."
  - "> **Legacy Disposal**: Before discarding or selling an old drive, use ChaBox's 'Wipe' feature for multiple physical overwrites. A simple 'Format' does not erase binary data."
  - "> **Plug-and-Pull Principle**: The safest strategy is 'Plug, Use, and Pull'. Never leave backup media connected to an online computer longer than necessary to block remote intrusion paths."
  - "> **Storage Environment**: Keep your backup media away from strong magnetic fields (like speakers/microwaves) and extreme temperatures. Flash and magnetic storage are sensitive to environment fluctuations."
  - "> **Discreet Labeling**: Avoid labels like 'Passwords' or 'Secret' on physical drives. Use meaningless codes to reduce unwanted attention if the device is lost or stolen."
  - "> **Regular Verification**: Every six months, try to decrypt a small file from your backup media to verify the data is still intact. Don't wait until an emergency to find out the drive has failed."
  - "> **Air-Gapped System**: For extremely high-value assets, use ChaBox or chapose on a **permanently offline** computer. An 'Air-gap' is the ultimate defense against network-based attacks."
  - "> **Physical Key Separation**: If you use chapose's `keyfile` feature, store the key file and the encrypted data on two different USB drives. This creates a 'two-man rule' style of security."
  - "> **Operational Wisdom: Redundancy Rules**: Borrowed from enterprise IT—**Backup, Backup, and Backup again**. Don't fear redundancy; use different media (USB, SSD, etc.). Encrypted data is safe to duplicate as long as your key is secure."
  - "> **Advanced Strategy: Off-site Backup**: Keep at least one backup drive at a different location (like an office vs. home). This protects your data against extreme events like fire or theft at a single site."
  - "> **Hardware Protection: Write-Protect**: For USB drives holding key files, choose models with a **physical write-protect switch**. Enable 'Read-Only' mode during decryption to physically block any malware from tampering with your keys."
  - "> **Final Disposal: Physical Destruction**: If a drive containing top-secret data fails and cannot be wiped via software, do not just toss it. Use physical force (like a drill or hammer) to destroy the chips, ensuring the data dies with the hardware."

# ------------------------------------------------------------
# 3. Crypto 101 (Expert Insights)
# ------------------------------------------------------------
crypto_lore:
  - "#### **Algorithm: ChaCha20-Poly1305**\nDesigned by renowned cryptographer Daniel J. Bernstein, this algorithm is blazing fast on mobile and older PCs. It is audited by experts and trusted by giants like Google and Cloudflare."
  - "#### **Defense: The Argon2id Shield**\nYour master password isn't stored directly—it's 'hardened' using Argon2id. This forces the computer to spend memory and time to verify it, making it extremely difficult for hackers to use high-power GPUs for brute-force attacks."
  - "#### **Strength: The 256-bit Key**\nChaBox uses 256-bit keys. This means there are 2^256 possible combinations—a number so vast that even all the world's supercomputers running until the sun burns out couldn't try every possibility."
  - "#### **Mechanism: AEAD Certified Encryption**\nChaBox doesn't just 'lock' data; it 'seals' it. If even a single byte of an encrypted file is tampered with, the app detects the change and refuses to decrypt, protecting you from malicious corruption."
  - "#### **Foundation: True Randomness (CSPRNG)**\nSecurity relies on randomness. ChaBox calls the system's underlying 'Secure Random Number Generator' to create keys and parameters, ensuring every encrypted package is unique and unpredictable."
  - "#### **Why Separate Steps?**\nChaBox keeps compression and encryption as independent steps to defend against 'Side-Channel Attacks'. Mixing them can leak content signatures via size changes. Keeping them separate blocks this risk."
  - "#### **Concept: What is a 'Side-Channel'?**\nThink of a hacker who doesn't crack a safe's code but listens to the clicks or measures the lock's temperature. ChaBox eliminates 'external clues' like execution time or file size patterns."
  - "#### **Comparison: Pro Crypto vs. ZIP Passwords**\nStandard ZIP/RAR encryption is often an 'add-on' with aging algorithms. ChaBox is a dedicated security tool using industrial-grade AEAD standards, providing far higher protection than basic archive passwords."
  - "#### **Principle: Owner-Only Access**\nEven developers cannot unlock your data. Since all encryption happens locally with no 'backdoor', your master password is the only key. Your data sovereignty is absolute."
  - "#### **Design: Stacked Extension Strategy**\nChaBox uses a clear stacked extension strategy (e.g., `.tar.gz.cha`). This lets you see the processing history at a glance: `.tar.gz` for archiving and `.cha` for encryption. It makes auditing easy."
  - "#### **Identity: Why the '.cha' Extension?**\nBeyond the ChaCha20 algorithm, `.cha` represents an **open-format encryption standard** for this ecosystem. It's a tribute to the tech and a professional badge of high-performance, authenticated streaming encryption."
  - "#### **Security: Why Open Algorithms?**\nReal security doesn't rely on 'secret recipes'. ChaBox uses standard, open algorithms. Only those that have survived decades of public scrutiny and attacks from the world's best hackers are truly trustworthy."
  - "#### **Detail: Binary-Level Protection**\nWhile ChaBox keeps the original filename for your convenience, all internal information—content, metadata, and structure—is transformed into an unreadable binary stream. Without the key, the file is a dead end."

