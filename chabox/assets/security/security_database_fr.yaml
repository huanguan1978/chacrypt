# Base de connaissances de la session de sécurité ChaBox - Édition française

# ------------------------------------------------------------
# 1. Conseils de pro (basés sur les docs ChaBox, chapose et ft:filetools)
# ------------------------------------------------------------
app_usage_tips:
  - "#### **Conseil de pro : Bouclier de confidentialité actif**\nChaBox désactive automatiquement les captures d'écran et l'enregistrement de l'écran du système pendant son exécution. Cela empêche les logiciels malveillants de capturer vos notes privées ou vos données sensibles, garantissant que vos « yeux privés » restent privés."
  - "#### **Conseil de pro : Aperçu en mémoire uniquement**\nLors de la prévisualisation de fichiers dans le « Coffre sécurisé », ChaBox déchiffre les données directement en mémoire. **Aucun fichier temporaire en clair n'est jamais créé sur le disque**, empêchant les traces sensibles de subsister dans les fragments du disque."
  - "#### **Conseil de pro : Interface à induction intelligente**\nL'écran d'accueil de ChaBox est sensible au contexte. Faire glisser des fichiers ou des dossiers normaux déclenche automatiquement « Chiffrer », tandis que faire glisser un fichier `.cha` bascule l'action sur « Déchiffrer »."
  - "#### **Conseil : Comprendre les traces de processus**\nChaBox utilise des extensions empilées (ex : `.tar.gz.cha`). `.tar.gz` indique que le fichier est archivé/compressé, et `.cha` signifie qu'il est chiffré. Cela fournit une piste d'audit claire de ce qui est arrivé à vos données."
  - "#### **Conseil : Sauvegarde automatique des notes**\nLors de l'édition de « Notes sécurisées », ChaBox conserve un brouillon de sauvegarde automatique en mémoire. Même si l'application se ferme de manière inattendue, votre progression peut être récupérée tant que le cache mémoire n'est pas vidé."
  - "#### **Conseil : Outils atomiques professionnels**\nLes icônes en haut mènent à cinq « outils atomiques » : Effacer, Archiver, Désarchiver, Chiffrer et Déchiffrer. Ils vous donnent un contrôle granulaire sur chaque étape, parfait pour les tâches complexes ou non standard."
  - "#### **Conseil : Filtrage avancé des fichiers**\nUtilisez le filtre dans le « Coffre sécurisé » pour trouver rapidement des fichiers à l'aide de motifs comme `**/*.txt`, ou affinez les résultats par taille, date de modification et type MIME."
  - "#### **Conseil : Bouée de sauvetage pour mot de passe**\nComme les mots de passe maîtres ne peuvent pas être récupérés, utilisez toujours la fonction « Exporter vers un fichier » dans la barre latérale pour sauvegarder votre mot de passe sur une clé USB sécurisée. C'est votre seul moyen de retour si vous l'oubliez."
  - "#### **Conseil : Archivage intelligent**\nLors de l'utilisation de l'outil « Archiver », ChaBox est intelligent : il compresse les fichiers texte pour gagner de la place mais ignore la re-compression des formats déjà compressés (comme les images/vidéos) pour économiser le CPU et maintenir la qualité."

  # --- chapose Advanced CLI Usage ---
  - "#### **Synergie CLI : Chiffrement fluide avec chapose**\nEn définissant la variable d'environnement `CHAPOSE_KEYFILE` sur le chemin de votre fichier de clé, vous pouvez exécuter `chapose encrypt <fichier>` directement sans spécifier la clé manuellement à chaque fois."
  - "#### **Synergie CLI : Architecture zéro fuite**\n**chapose** utilise une architecture de streaming pur pour traiter des fichiers de n'importe quelle taille (même des To). Il traite les données sans créer de swaps temporaires en clair, gardant votre disque physique propre."
  - "#### **Synergie CLI : Effacement forcé sur tâche**\nLors de l'utilisation de **chapose**, ajoutez le drapeau `-D` pour effacer automatiquement et en toute sécurité le fichier source après un chiffrement ou un déchiffrement réussi, ne laissant aucune trace derrière lui."
  - "#### **Synergie CLI : Protection de l'intégrité**\n**chapose** intègre des contrôles d'intégrité robustes. Si un paquet chiffré subit une modification malveillante, le déchiffrement échouera immédiatement pour empêcher les attaques par corruption de données."
  - "#### **Synergie CLI : Gestion des fichiers de clé**\nEn plus de saisir des mots de passe, vous pouvez utiliser `chapose keyfile` pour générer des fichiers de clé aléatoires à haute entropie. Utilisez le drapeau `-p` pour ajouter une couche supplémentaire de protection par mot de passe au fichier de clé lui-même."

  # --- Automation Synergy with ft:filetools ---
  - "#### **Outil d'automatisation : Découvrez ft:filetools**\n**ft:filetools** est un outil de streaming haute performance conçu par le même auteur. Il excelle dans la recherche de fichiers, l'archivage, l'effacement sécurisé et surtout le **scripting Shell**. C'est le « cerveau » pour les flux de travail de sécurité complexes."
  - "#### **Automatisation : Pipeline de sauvegarde sécurisée**\nUtilisez `ft archive` pour regrouper un répertoire sensible, envoyez-le à **chapose** pour le chiffrement, et utilisez enfin `ft wipe` pour déchiqueter l'archive intermédiaire. Tout ce flux peut être entièrement automatisé via `ft shell`."
  - "#### **Automatisation : La puissance de ft shell**\n**ft shell** est l'âme de l'automatisation. En écrivant un simple script YAML, vous pouvez assembler la gestion des fichiers de `ft` avec la puissance cryptographique de **chapose** pour créer un pipeline de sécurité de qualité production."
  - "#### **Automatisation : Flux de restauration sécurisé**\nPour les archives chiffrées (ex : `.tar.gz.cha`), déchiffrez d'abord avec **chapose**, puis utilisez `ft unarchive` pour la restauration en continu. Ce combo garantit que même les répertoires massifs sont extraits rapidement et en toute sécurité."
  - "#### **Automatisation : Nettoyage précis de l'environnement**\nAprès des tâches complexes, utilisez `ft clean` avec des motifs spécifiques pour supprimer chirurgicalement les fragments intermédiaires. Combinez-le avec `rmdir` pour supprimer en toute sécurité les structures de répertoires vides, gardant votre stockage vierge."
  - "#### **Automatisation : Effacement de qualité industrielle**\nLa commande `wipe` de **ft:filetools** offre une destruction bien au-delà de la suppression standard. Après avoir traité des données top secrètes, utilisez `wipe` pour écraser les secteurs et bloquer toute récupération de données de niveau laboratoire."

# ------------------------------------------------------------
# 2. Sécurité physique et habitudes (Meilleures pratiques hors ligne)
# ------------------------------------------------------------
physical_security:
  - "> **Habitude hors ligne** : Effacez toujours votre presse-papiers système après des opérations sensibles. Activez « Effacement automatique du presse-papiers » dans les réglages pour réduire la fenêtre d'exposition à quelques secondes."
  - "> **Sauvegarde physique** : Le matériel finit par tomber en panne. Écrivez à la main votre mot de passe maître ou votre graine de récupération sur un **support papier non numérique** et conservez-le dans un endroit ignifuge, sec et caché."
  - "> **Contrôle de l'environnement** : Lors de la saisie de votre mot de passe maître ou de la manipulation de fichiers secrets, faites attention à votre environnement. Méfiez-vous des caméras ou du « shoulder surfing »."
  - "> **Rafraîchissement du support** : Les clés USB ou disques durs externes utilisés pour les sauvegardes doivent être « rafraîchis » tous les 2-3 ans. Déplacez les données vers un nouvel appareil pour prévenir le « Bit Rot » et le vieillissement du matériel."
  - "> **Défense contre le démarrage à froid** : Fermez toujours l'application ChaBox avant de quitter votre ordinateur. Cela déclenche un effacement de la mémoire, empêchant les clés de subsister dans la RAM pendant la veille ou l'hibernation."
  - "> **Élimination sécurisée** : Avant de jeter ou de vendre un ancien disque, utilisez la fonction « Effacer » de ChaBox pour plusieurs écrasements physiques. Un simple « Formatage » n'efface pas les données binaires."
  - "> **Principe de branchement et retrait** : La stratégie la plus sûre est « Brancher, Utiliser et Retirer ». Ne laissez jamais vos supports de sauvegarde branchés sur un ordinateur en ligne plus longtemps que nécessaire pour bloquer les chemins d'intrusion à distance."
  - "> **Environnement de stockage** : Éloignez vos supports de sauvegarde des champs magnétiques puissants (comme les haut-parleurs/micro-ondes) et des températures extrêmes. Le stockage flash et magnétique est sensible aux fluctuations de l'environnement."
  - "> **Étiquetage discret** : Évitez les étiquettes comme « Mots de passe » ou « Secret » sur les disques physiques. Utilisez des codes sans signification pour réduire l'attention indésirable si l'appareil est perdu ou volé."
  - "> **Vérification régulière** : Tous les six mois, essayez de déchiffrer un petit fichier de votre support de sauvegarde pour vérifier que les données sont toujours intactes. N'attendez pas une urgence pour découvrir que le disque est en panne."
  - "> **Système Air-Gapped** : Pour les actifs de très grande valeur, utilisez ChaBox ou chapose sur un ordinateur **définitivement hors ligne**. Un « Air-gap » est la défense ultime contre les attaques basées sur le réseau."
  - "> **Séparation physique des clés** : Si vous utilisez la fonction `keyfile` de chapose, stockez le fichier de clé et les données chiffrées sur deux clés USB différentes. Cela crée une sécurité de style « règle des deux personnes »."
  - "> **Sagesse opérationnelle : Règles de redondance** : Emprunté à l'informatique d'entreprise — **Sauvegardez, sauvegardez et sauvegardez encore**. Ne craignez pas la redondance ; utilisez différents supports (USB, SSD, etc.). Les données chiffrées peuvent être dupliquées en toute sécurité tant que votre clé est sûre."
  - "> **Stratégie avancée : Sauvegarde hors site** : Conservez au moins un disque de sauvegarde dans un endroit différent (ex: bureau vs domicile). Cela protège vos données contre les événements extrêmes comme un incendie ou un vol sur un seul site."
  - "> **Protection matérielle : Commutateur d'écriture** : Pour les clés USB contenant des fichiers de clé, choisissez des modèles avec un **commutateur physique de protection contre l'écriture**. Activez le mode « Lecture seule » pendant le déchiffrement pour bloquer physiquement tout logiciel malveillant de modifier vos clés."
  - "> **Élimination finale : Destruction physique** : Si un disque contenant des données top secrètes tombe en panne et ne peut pas être effacé par logiciel, ne le jetez pas simplement. Utilisez la force physique (comme une perceuse ou un marteau) pour détruire les puces, garantissant que les données meurent avec le matériel."

# ------------------------------------------------------------
# 3. Crypto 101 (Expert Insights)
# ------------------------------------------------------------
crypto_lore:
  - "#### **Algorithme : ChaCha20-Poly1305**\nConçu par le célèbre cryptographe Daniel J. Bernstein, cet algorithme est incroyablement rapide sur mobile et vieux PC. Il est audité par des experts et utilisé par des géants comme Google et Cloudflare."
  - "#### **Défense : Le bouclier Argon2id**\nVotre mot de passe maître n'est pas stocké directement — il est « durci » à l'aide d'Argon2id. Cela force l'ordinateur à consacrer de la mémoire et du temps pour le vérifier, ce qui rend extrêmement difficile pour les hackers d'utiliser des GPU haute puissance pour des attaques par force brute."
  - "#### **Force : La clé 256 bits**\nChaBox utilise des clés de 256 bits. Cela signifie qu'il existe 2^256 combinaisons possibles — un nombre si vaste que même tous les superordinateurs du monde tournant jusqu'à ce que le soleil s'éteigne ne pourraient pas essayer toutes les possibilités."
  - "#### **Mécanisme : Chiffrement certifié AEAD**\nChaBox ne se contente pas de « verrouiller » les données ; il les « scelle ». Si un seul octet d'un fichier chiffré est modifié, l'application détecte le changement et refuse le déchiffrement, vous protégeant ainsi d'une corruption malveillante."
  - "#### **Fondement : Véritable aléatoire (CSPRNG)**\nLa sécurité repose sur le hasard. ChaBox appelle le « Générateur de nombres aléatoires sécurisé » du système pour créer des clés et des paramètres, garantissant que chaque paquet chiffré est unique et imprévisible."
  - "#### **Pourquoi des étapes séparées ?**\nChaBox maintient la compression et le chiffrement comme des étapes indépendantes pour se défendre contre les « attaques par canal latéral ». Les mélanger peut fuiter des signatures de contenu via des changements de taille. Les garder séparés bloque ce risque."
  - "#### **Concept : Qu'est-ce qu'un « canal latéral » ?**\nPensez à un hacker qui ne force pas le code d'un coffre-fort mais écoute les clics ou mesure la température de la serrure. ChaBox élimine les « indices externes » comme le temps d'exécution ou les motifs de taille de fichier."
  - "#### **Comparaison : Crypto Pro vs Mots de passe ZIP**\nLe chiffrement ZIP/RAR standard est souvent un « ajout » avec des algorithmes vieillissants. ChaBox est un outil de sécurité dédié utilisant des normes AEAD de qualité industrielle, offrant une protection bien supérieure aux simples mots de passe d'archive."
  - "#### **Principe : Accès propriétaire uniquement**\nMême les développeurs ne peuvent pas déverrouiller vos données. Comme tout le chiffrement se passe localement sans « porte dérobée », votre mot de passe maître est la seule clé. Votre souveraineté sur les données est absolue."
  - "#### **Design : Stratégie d'extension empilée**\nChaBox utilise une stratégie d'extension empilée claire (ex : `.tar.gz.cha`). Cela vous permet de voir l'historique de traitement en un coup d'œil : `.tar.gz` pour l'archivage et `.cha` pour le chiffrement. Cela rend l'audit facile."
  - "#### **Identité : Pourquoi l'extension '.cha' ?**\nAu-delà de l'algorithme ChaCha20, `.cha` représente un **standard de chiffrement à format ouvert** pour cet écosystème. C'est un hommage à la technologie et un emblème professionnel de chiffrement de flux authentifié haute performance."
  - "#### **Sécurité : Pourquoi des algorithmes ouverts ?**\nLa vraie sécurité ne repose pas sur des « recettes secrètes ». ChaBox utilise des algorithmes standard et ouverts. Seuls ceux qui ont survécu à des décennies de contrôle public et d'attaques des meilleurs hackers du monde sont vraiment dignes de confiance."
  - "#### **Détail : Protection au niveau binaire**\nBien que ChaBox conserve le nom de fichier original pour votre commodité, toutes les informations internes — contenu, métadonnées et structure — sont transformées en un flux binaire illisible. Sans la clé, le fichier est une impasse."

