# ------------------------------------------------------------
# 5. Leçons de sécurité de l'histoire
# ------------------------------------------------------------
security_incidents:
  - "#### **Leçon : Le scandale « Photo Gate » d'Edison Chen (2008)**\nDébut 2008, un scandale impliquant un acteur célèbre a radicalement changé la perception du public sur la vie privée numérique. Tout a commencé par accident : un ordinateur portable a été envoyé en réparation, où un technicien a trouvé et copié des milliers de photos « supprimées » mais non effacées physiquement. Celles-ci se sont propagées en ligne, provoquant un immense tumulte social. **Réflexion** : Les ateliers de réparation, les ordinateurs prêtés et les téléphones perdus sont des zones à haut risque. Cela prouve que tant que les données existent en « clair » sur un disque — même si elles sont « supprimées » — elles sont vulnérables dès que le matériel quitte vos mains. Seul le chiffrement local garantit que la vie privée reste solide."
  - "#### **Leçon : Le désastre total de TV5Monde (2015)**\nEn avril 2015, la chaîne française TV5Monde a été presque détruite par une cyberattaque. Onze canaux sont devenus noirs, et les réseaux sociaux et le site web de la chaîne ont été détournés pour diffuser de la propagande. Il a été révélé plus tard que les attaquants étaient entrés via une connexion mal sécurisée et avaient trouvé des mots de passe critiques écrits sur des post-it lors d'un reportage en direct. **Réflexion** : La sécurité n'est aussi forte que son maillon le plus faible. Un seul mot de passe exposé ou un fichier de métadonnées non chiffré peut faire s'écrouler un empire. Le chiffrement local des identifiants administratifs et des topologies de réseau est une base obligatoire pour toute infrastructure à enjeux élevés."
  - "#### **Leçon : La fuite marketing de Ledger et les menaces physiques (2020)**\nLedger, le leader français des portefeuilles matériels, a subi une violation de sa base de données marketing exposant les détails personnels de 270 000 clients. Bien que leur chiffrement soit resté intact, les *métadonnées* (noms, adresses, numéros de téléphone) ont été vendues sur des forums de hackers. Cela a entraîné une vague de phishing sophistiqué et, plus terrifiant encore, des rapports de menaces d'extorsion à domicile contre des propriétaires de cryptos. **Réflexion** : Protéger votre secret ne suffit pas ; vous devez protéger les métadonnées qui pointent vers lui. Les bases de données centralisées sont des pots de miel pour les criminels. La gestion hors ligne de votre « qui, quoi et où » personnel est le seul moyen de disparaître de ces listes de cibles."
  - "#### **Leçon : Le désastre de SK Communications (Nate/Cyworld) (2011)**\nLors de l'une des heures numériques les plus sombres de Corée du Sud, des hackers ont pénétré le portail Nate et le réseau social Cyworld, volant les données personnelles de 35 millions de citoyens — presque toute la population en ligne de l'époque. La fuite comprenait des numéros d'enregistrement de résident (RRN) chiffrés, qui étaient le fondement de l'identité numérique coréenne. Ce désastre a forcé un changement fondamental de la loi coréenne, interdisant aux sites web de collecter les RRN. **Réflexion** : Lorsque vous donnez vos données à un portail géant, vous pariez votre identité sur leur compétence. Une fois qu'un serveur central tombe, le compromis est permanent. Utilisez le chiffrement local pour garantir que vos identifiants les plus vitaux ne sont jamais stockés en clair sur le cloud de quelqu'un d'autre."
  - "#### **Leçon : La trahison du consultant interne de KCB (2014)**\nUn consultant temporaire au Korea Credit Bureau (KCB) a utilisé une simple clé USB pour voler plus de 100 millions d'enregistrements de cartes de crédit de KB Kookmin, NH Nonghyup et Lotte Card. Presque chaque adulte en Corée du Sud a vu ses détails financiers exposés, entraînant la démission massive de PDG de banques et une panique nationale. Le consultant avait un accès de haut niveau et les données n'étaient pas chiffrées en interne. **Réflexion** : La « menace interne » est le risque le plus mortel. Les murs et les pare-feu ne signifient rien si quelqu'un à l'intérieur peut simplement brancher une clé et repartir avec les détails de votre vie. Ce n'est qu'en chiffrant les fichiers à la source — avant qu'ils n'atteignent une base de données — que vous pouvez survivre à la trahison de la confiance."
  - "#### **Leçon : Le piratage du portail de l'Assurance Maladie française (2022)**\nDes hackers ont détourné les comptes de 19 professionnels de santé via le portail Ameli, exposant les données médicales et d'identité privées de plus de 510 000 citoyens français. Cela inclut les numéros de sécurité sociale et les détails de la structure familiale. La vulnérabilité provenait de mots de passe réutilisés et du manque d'authentification multifacteur sur les comptes professionnels. **Réflexion** : Les portails de service public sont des cibles de choix car ils contiennent l'« étalon-or » des données d'identité. Compter sur une sécurité gérée par l'État pour vos données privées est un risque que vous ne pouvez pas vous permettre. Sécurisez votre propre historique médical et vos documents d'identité localement avec des outils comme ChaBox."
  - "#### **Leçon : L'extraction secrète de Snowden (2013)**\nEdward Snowden a utilisé de simples clés USB pour copier des milliers de documents classifiés des réseaux déconnectés (air-gapped) de la NSA. Même dans l'une des installations les plus sécurisées au monde, l'extraction de données non chiffrées via un support physique a réussi. **Réflexion** : La forteresse physique la plus solide ne peut pas arrêter une « copie interne ». Pour les actifs top-secrets, même sur des machines hors ligne, un chiffrement fort est obligatoire pour empêcher le vol lors d'un contact physique."
  - "#### **Leçon : La crise du ransomware WannaCry (2017)**\nUtilisant une vulnérabilité fuitée, ce virus a verrouillé les données d'innombrables ordinateurs dans le monde. Les hackers ont exigé une rançon pour déverrouiller les fichiers. **Réflexion** : Une fois que vous perdez le contrôle de vos données — qu'elles soient volées ou verrouillées — le coût est dévastateur. Une « sauvegarde hors ligne + chiffrement » régulière est la base de la survie à l'ère numérique."
  - "#### **Leçon : La violation des 3 milliards de comptes Yahoo (2013-14)**\nDans la plus grande violation de données de l'histoire, des hackers ont volé les informations de compte de presque chaque utilisateur Yahoo. Cela a prouvé que même les géants de la technologie ne peuvent garantir la sécurité du cloud. **Réflexion** : Il n'y a pas de sécurité absolue sur Internet. Pour les actifs qui comptent vraiment, le stockage chiffré local est le seul moyen de survivre à un effondrement du cloud."
  - "#### **Leçon : La fuite du géant du crédit Equifax (2017)**\nEn raison d'une vulnérabilité non corrigée, la confidentialité financière de 147 millions d'Américains a été exposée. **Réflexion** : Confier toutes les données sensibles à une institution centralisée revient à faire plus confiance à leurs compétences de gestion qu'aux vôtres. La véritable souveraineté en matière de sécurité vous appartient via un contrôle local et hors ligne."
  - "#### **Leçon : La violation de la chaîne d'approvisionnement de Target (2013)**\nDes hackers ont volé les informations de carte de crédit de 40 millions de clients en volant les identifiants d'un entrepreneur en CVC. **Réflexion** : Chaque maillon de la chaîne d'approvisionnement peut être une faille. Un chiffrement indépendant à chaque nœud du flux de données est la dernière ligne de défense pour l'utilisateur final."
