name: chapose build (macos)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: true
        default: main
        type: string

defaults:
  run:
    working-directory: chapose

jobs:
  build_macos_x64:
    name: Build macOS x64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Get Project Version
        id: get_version
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | tr -d '[:space:]')
          APP_VERSION_BASE="${APP_VERSION%%+*}"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "app_version_base=$APP_VERSION_BASE" >> "$GITHUB_OUTPUT"
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Generate version.g.dart
        run: |
          cat > lib/src/version.g.dart <<EOF
          const String packageVersion = '${{ steps.get_version.outputs.app_version }}';
          EOF
      - name: Compile executable
        run: |
          EXECUTABLE_NAME="chapose-${{ steps.get_version.outputs.app_version_base }}-macos-x64"
          mkdir -p build
          dart compile exe bin/chapose.dart -o build/$EXECUTABLE_NAME
      - name: Write build info
        run: |
          cat > build/BUILD_INFO.txt <<EOF
          project=chapose
          version=${{ steps.get_version.outputs.app_version_base }}
          version_full=${{ steps.get_version.outputs.app_version }}
          git_ref=${{ inputs.ref }}
          git_sha=${{ github.sha }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          built_os=macos
          built_arch=x64
          EOF
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chapose-macos-x64-${{ steps.get_version.outputs.app_version_base }}
          retention-days: 30
          path: |
            chapose/build/chapose-${{ steps.get_version.outputs.app_version_base }}-macos-x64
            chapose/build/BUILD_INFO.txt
            chapose/LICENSE
            chapose/*.md
            chapose/doc/en/*.md
            chapose/doc/zh/*.md

  build_macos_arm64:
    name: Build macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Get Project Version
        id: get_version
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | tr -d '[:space:]')
          APP_VERSION_BASE="${APP_VERSION%%+*}"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "app_version_base=$APP_VERSION_BASE" >> "$GITHUB_OUTPUT"
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Generate version.g.dart
        run: |
          cat > lib/src/version.g.dart <<EOF
          const String packageVersion = '${{ steps.get_version.outputs.app_version }}';
          EOF
      - name: Compile executable
        run: |
          EXECUTABLE_NAME="chapose-${{ steps.get_version.outputs.app_version_base }}-macos-arm64"
          mkdir -p build
          dart compile exe bin/chapose.dart -o build/$EXECUTABLE_NAME
      - name: Write build info
        run: |
          cat > build/BUILD_INFO.txt <<EOF
          project=chapose
          version=${{ steps.get_version.outputs.app_version_base }}
          version_full=${{ steps.get_version.outputs.app_version }}
          git_ref=${{ inputs.ref }}
          git_sha=${{ github.sha }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          built_os=macos
          built_arch=arm64
          EOF
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chapose-macos-arm64-${{ steps.get_version.outputs.app_version_base }}
          retention-days: 30
          path: |
            chapose/build/chapose-${{ steps.get_version.outputs.app_version_base }}-macos-arm64
            chapose/build/BUILD_INFO.txt
            chapose/LICENSE
            chapose/*.md
            chapose/doc/en/*.md
            chapose/doc/zh/*.md
