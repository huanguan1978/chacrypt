name: chabox prepare

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to prepare (branch, tag, or SHA)
        required: true
        default: main
        type: string

defaults:
  run:
    working-directory: chabox

jobs:
  prepare:
    name: Prepare Source For Build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Check required Linux platform folder
        run: |
          if [ ! -d linux ]; then
            echo "Error: required platform folder 'linux' is missing under chabox/."
            echo "Run flutter create --platforms=linux . in chabox and commit the generated platform files."
            exit 1
          fi

      - name: Check generated assets and one-time generated files
        run: |
          required_files=(          
            "assets/chabox_appstream_metainfo.xml"
            "assets/chabox_shared_mime_info.xml"
            "assets/unstaged/secret.b64"            
            "assets/security/security_database_en.yaml"
            "assets/license/notices_en.md"
            "assets/eula/eula_en.md"
            "assets/ecos/ecos_en.md"            
            "l10n.yaml"
            "lib/l10n/app_localizations.dart"
            "lib/l10n/messages_registry.g.dart"
          )

          missing=0
          for path in "${required_files[@]}"; do
            if [ ! -f "$path" ]; then
              echo "Error: required generated file '$path' is missing."
              missing=1
            fi
          done

          security_count=$(find assets/security -maxdepth 1 -name 'security_database_*.yaml' | wc -l | tr -d '[:space:]')
          if [ "$security_count" -lt 8 ]; then
            echo "Error: expected at least 8 security database files, got $security_count."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write prepare metadata
        run: |
          mkdir -p .prepare
          cat > .prepare/PREPARE_INFO.env <<EOF
          PREPARE_GIT_REF=${{ inputs.ref }}
          PREPARE_GIT_SHA=${{ github.sha }}
          PREPARE_RUN_ID=${{ github.run_id }}
          PREPARE_RUN_ATTEMPT=${{ github.run_attempt }}
          PREPARE_TIMESTAMP_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Upload prepared source artifact
        uses: actions/upload-artifact@v4
        with:
          name: chabox-prepared-source
          retention-days: 14
          path: chabox