name: chabox build (linux)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      prepare_run_id:
        description: Run ID of chabox prepare workflow
        required: true
        type: string

defaults:
  run:
    working-directory: chabox

jobs:
  get_prepare_meta:
    name: Read Prepared Source Metadata
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: .
    outputs:
      app_version: ${{ steps.get_version.outputs.app_version }}
      app_version_base: ${{ steps.get_version.outputs.app_version_base }}
      git_ref: ${{ steps.get_version.outputs.git_ref }}
      git_sha: ${{ steps.get_version.outputs.git_sha }}
      prepare_timestamp_utc: ${{ steps.get_version.outputs.prepare_timestamp_utc }}
      prepare_run_id_meta: ${{ steps.get_version.outputs.prepare_run_id_meta }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.prepare_run_id }}
          name: chabox-prepared-source
          path: dist/chabox
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Read version and prepare metadata
        id: get_version
        run: |
          APP_VERSION=$(grep '^version:' dist/chabox/pubspec.yaml | sed 's/version: //g' | tr -d '[:space:]')
          APP_VERSION_BASE="${APP_VERSION%%+*}"
          source dist/chabox/.prepare/PREPARE_INFO.env
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "app_version_base=$APP_VERSION_BASE" >> "$GITHUB_OUTPUT"
          echo "git_ref=$PREPARE_GIT_REF" >> "$GITHUB_OUTPUT"
          echo "git_sha=$PREPARE_GIT_SHA" >> "$GITHUB_OUTPUT"
          echo "prepare_timestamp_utc=$PREPARE_TIMESTAMP_UTC" >> "$GITHUB_OUTPUT"
          echo "prepare_run_id_meta=$PREPARE_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Prepare metadata:"
          echo "  input_prepare_run_id=${{ inputs.prepare_run_id }}"
          echo "  prepare_run_id_meta=$PREPARE_RUN_ID"
          echo "  prepare_timestamp_utc=$PREPARE_TIMESTAMP_UTC"
          echo "  git_ref=$PREPARE_GIT_REF"
          echo "  git_sha=$PREPARE_GIT_SHA"

  build_linux_x64:
    name: Build Linux x64
    runs-on: ubuntu-22.04
    needs: get_prepare_meta
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.prepare_run_id }}
          name: chabox-prepared-source
          path: chabox
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout chapose source at prepared commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.get_prepare_meta.outputs.git_sha }}
          fetch-depth: 1
          sparse-checkout: |
            chapose
          path: repo
      - name: Place chapose path dependency
        run: cp -a repo/chapose ./chapose
      - name: Create temporary workspace root
        run: |
          cat > pubspec.yaml <<'EOF'
          name: chacrypt_ci
          publish_to: none
          environment:
            sdk: '>=3.10.0 <4.0.0'
          workspace:
            - chabox
            - chapose
          EOF
      - name: Print build input summary
        run: |
          echo "Build target: linux/x64"
          echo "prepare_run_id(input)=${{ inputs.prepare_run_id }}"
          echo "prepare_run_id(meta)=${{ needs.get_prepare_meta.outputs.prepare_run_id_meta }}"
          echo "prepare_timestamp_utc=${{ needs.get_prepare_meta.outputs.prepare_timestamp_utc }}"
          echo "git_ref=${{ needs.get_prepare_meta.outputs.git_ref }}"
          echo "git_sha=${{ needs.get_prepare_meta.outputs.git_sha }}"
          echo "expected_artifact=chabox-build-linux-x64-${{ needs.get_prepare_meta.outputs.app_version_base }}"
      - name: Install Flutter SDK 3.41.9
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.41.9 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
      - name: Print Flutter version
        run: flutter --version
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev
      - run: cd chabox && flutter pub get
      - run: cd chabox && flutter build linux --release --obfuscate --split-debug-info=build/split-debug-info/linux/x64
      - name: Verify build artifact exists
        run: |
          ARTIFACT_PATH="chabox/build/linux/x64/release/bundle"
          test -d "$ARTIFACT_PATH"
          echo "Build artifact directory exists: $ARTIFACT_PATH"
      - name: Verify debug artifact exists
        run: |
          DEBUG_ARTIFACT_PATH="chabox/build/split-debug-info/linux/x64"
          test -d "$DEBUG_ARTIFACT_PATH"
          echo "Debug artifact directory exists: $DEBUG_ARTIFACT_PATH"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chabox-build-linux-x64-${{ needs.get_prepare_meta.outputs.app_version_base }}
          retention-days: 30
          path: chabox/build/linux/x64/release/bundle
      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: chabox-debug-linux-x64-${{ needs.get_prepare_meta.outputs.app_version_base }}
          retention-days: 30
          path: chabox/build/split-debug-info/linux/x64

  build_linux_arm64:
    name: Build Linux arm64
    runs-on: ubuntu-24.04-arm
    needs: get_prepare_meta
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.prepare_run_id }}
          name: chabox-prepared-source
          path: chabox
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout chapose source at prepared commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.get_prepare_meta.outputs.git_sha }}
          fetch-depth: 1
          sparse-checkout: |
            chapose
          path: repo
      - name: Place chapose path dependency
        run: cp -a repo/chapose ./chapose
      - name: Create temporary workspace root
        run: |
          cat > pubspec.yaml <<'EOF'
          name: chacrypt_ci
          publish_to: none
          environment:
            sdk: '>=3.10.0 <4.0.0'
          workspace:
            - chabox
            - chapose
          EOF
      - name: Print build input summary
        run: |
          echo "Build target: linux/arm64"
          echo "prepare_run_id(input)=${{ inputs.prepare_run_id }}"
          echo "prepare_run_id(meta)=${{ needs.get_prepare_meta.outputs.prepare_run_id_meta }}"
          echo "prepare_timestamp_utc=${{ needs.get_prepare_meta.outputs.prepare_timestamp_utc }}"
          echo "git_ref=${{ needs.get_prepare_meta.outputs.git_ref }}"
          echo "git_sha=${{ needs.get_prepare_meta.outputs.git_sha }}"
          echo "expected_artifact=chabox-build-linux-arm64-${{ needs.get_prepare_meta.outputs.app_version_base }}"
      - name: Install Flutter SDK 3.41.9
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch 3.41.9 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"
      - name: Print Flutter version
        run: flutter --version
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libx11-dev pkg-config cmake ninja-build libblkid-dev
      - run: cd chabox && flutter pub get
      - run: cd chabox && flutter build linux --release --target-platform=linux-arm64 --obfuscate --split-debug-info=build/split-debug-info/linux/arm64
      - name: Verify build artifact exists
        run: |
          ARTIFACT_PATH="chabox/build/linux/arm64/release/bundle"
          test -d "$ARTIFACT_PATH"
          echo "Build artifact directory exists: $ARTIFACT_PATH"
      - name: Verify debug artifact exists
        run: |
          DEBUG_ARTIFACT_PATH="chabox/build/split-debug-info/linux/arm64"
          test -d "$DEBUG_ARTIFACT_PATH"
          echo "Debug artifact directory exists: $DEBUG_ARTIFACT_PATH"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chabox-build-linux-arm64-${{ needs.get_prepare_meta.outputs.app_version_base }}
          retention-days: 30
          path: chabox/build/linux/arm64/release/bundle
      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: chabox-debug-linux-arm64-${{ needs.get_prepare_meta.outputs.app_version_base }}
          retention-days: 30
          path: chabox/build/split-debug-info/linux/arm64
