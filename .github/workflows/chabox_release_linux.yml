name: chabox release (linux)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (format: chabox-vX.Y.Z)'
        required: true
        type: string
      build_run_id:
        description: Build workflow run ID to consume artifacts from
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  validate:
    name: Validate Tag Format
    runs-on: ubuntu-22.04
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^chabox-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: invalid tag format '${{ inputs.tag }}'. Expected chabox-vX.Y.Z"
            exit 1
          fi

  package_appimage_x64:
    name: Build x64 AppImage
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - name: Download x64 build artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.build_run_id }}
          pattern: chabox-build-linux-x64-*
          path: dist/x64
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y file wget libfuse2 appstream
      - name: Prepare AppDir structure
        run: |
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          mkdir -p AppDir/usr/share/metainfo
      - name: Copy Flutter bundle
        run: |
          BUNDLE_DIR=$(find dist/x64 -name "chabox" -type f | head -n 1 | xargs dirname)
          if [ -z "$BUNDLE_DIR" ] || [ ! -d "$BUNDLE_DIR" ]; then
            echo "Error: Could not locate built Flutter binary in dist/x64"
            exit 1
          fi
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> $GITHUB_ENV
          cp -a "$BUNDLE_DIR"/* AppDir/
      - name: Extract desktop entry and icons
        run: |
          ASSETS_DIR="$BUNDLE_DIR/data/flutter_assets/assets"
          if [ ! -d "$ASSETS_DIR" ]; then
            echo "Error: Could not locate flutter assets directory at $ASSETS_DIR"
            exit 1
          fi
          cp "$ASSETS_DIR/chabox.desktop" AppDir/usr/share/applications/com.iche2.chabox.desktop
          cp "$ASSETS_DIR/chabox_icon_rounded_512x512.png" AppDir/usr/share/icons/hicolor/scalable/apps/com.iche2.chabox.png
          cp "$ASSETS_DIR/chabox_appstream_metainfo.xml" AppDir/usr/share/metainfo/com.iche2.chabox.metainfo.xml
          cp "$ASSETS_DIR/chabox.desktop" AppDir/chabox.desktop
          cp "$ASSETS_DIR/chabox_icon_rounded_512x512.png" AppDir/com.iche2.chabox.png
      - name: Create AppRun
        run: |
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/chabox" "$@"
          EOF
          chmod +x AppDir/AppRun
      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-x86_64 -O runtime-x86_64
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool -v --runtime-file runtime-x86_64 AppDir "${{ inputs.tag }}-linux-x86_64.AppImage"
      - name: Upload x64 AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: chabox-appimage-x64
          retention-days: 1
          path: ${{ inputs.tag }}-linux-x86_64.AppImage

  package_appimage_arm64:
    name: Build arm64 AppImage
    runs-on: ubuntu-24.04-arm
    needs: validate
    steps:
      - name: Download arm64 build artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ inputs.build_run_id }}
          pattern: chabox-build-linux-arm64-*
          path: dist/arm64
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y file wget libfuse2 appstream
      - name: Prepare AppDir structure
        run: |
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          mkdir -p AppDir/usr/share/metainfo
      - name: Copy Flutter bundle
        run: |
          BUNDLE_DIR=$(find dist/arm64 -name "chabox" -type f | head -n 1 | xargs dirname)
          if [ -z "$BUNDLE_DIR" ] || [ ! -d "$BUNDLE_DIR" ]; then
            echo "Error: Could not locate built Flutter binary in dist/arm64"
            exit 1
          fi
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> $GITHUB_ENV
          cp -a "$BUNDLE_DIR"/* AppDir/
      - name: Extract desktop entry and icons
        run: |
          ASSETS_DIR="$BUNDLE_DIR/data/flutter_assets/assets"
          if [ ! -d "$ASSETS_DIR" ]; then
            echo "Error: Could not locate flutter assets directory at $ASSETS_DIR"
            exit 1
          fi
          cp "$ASSETS_DIR/chabox.desktop" AppDir/usr/share/applications/com.iche2.chabox.desktop
          cp "$ASSETS_DIR/chabox_icon_rounded_512x512.png" AppDir/usr/share/icons/hicolor/scalable/apps/com.iche2.chabox.png
          cp "$ASSETS_DIR/chabox_appstream_metainfo.xml" AppDir/usr/share/metainfo/com.iche2.chabox.metainfo.xml
          cp "$ASSETS_DIR/chabox.desktop" AppDir/chabox.desktop
          cp "$ASSETS_DIR/chabox_icon_rounded_512x512.png" AppDir/com.iche2.chabox.png
      - name: Create AppRun
        run: |
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/chabox" "$@"
          EOF
          chmod +x AppDir/AppRun
      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage -O appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/runtime-aarch64 -O runtime-aarch64
          chmod +x appimagetool
          ARCH=aarch64 ./appimagetool -v --runtime-file runtime-aarch64 AppDir "${{ inputs.tag }}-linux-aarch64.AppImage"
      - name: Upload arm64 AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: chabox-appimage-arm64
          retention-days: 1
          path: ${{ inputs.tag }}-linux-aarch64.AppImage

  release:
    name: Draft GitHub Release
    runs-on: ubuntu-22.04
    needs: [package_appimage_x64, package_appimage_arm64]
    steps:
      - name: Clean release directory
        run: rm -rf release-assets && mkdir -p release-assets
      - name: Download AppImage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: chabox-appimage-*
          path: release-assets
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum *.AppImage > SHA256SUMS-linux.txt
      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Attempt to create the release. If it fails (e.g., already exists), upload assets instead.
          if ! gh release create "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.tag }}" \
            --draft \
            --generate-notes \
            release-assets/*.AppImage \
            release-assets/SHA256SUMS-linux.txt; then
            
            echo "Release '${{ inputs.tag }}' already exists. Uploading assets..."
            gh release upload "${{ inputs.tag }}" \
              --repo "${{ github.repository }}" \
              --clobber \
              release-assets/*.AppImage \
              release-assets/SHA256SUMS-linux.txt
          fi
