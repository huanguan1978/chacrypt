name: chapose build (linux)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch, tag, or SHA)
        required: true
        default: main
        type: string

defaults:
  run:
    working-directory: chapose

jobs:
  get_version:
    name: Get Project Version
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.get_version.outputs.app_version }}
      app_version_base: ${{ steps.get_version.outputs.app_version_base }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Get Project Version
        id: get_version
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | tr -d '[:space:]')
          APP_VERSION_BASE="${APP_VERSION%%+*}"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "app_version_base=$APP_VERSION_BASE" >> "$GITHUB_OUTPUT"

  build_linux_multi_arch:
    name: Build Linux multi-arch
    runs-on: macos-14
    needs: get_version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Compile Linux x64
        run: |
          EXECUTABLE_NAME="chapose-${{ needs.get_version.outputs.app_version_base }}-linux-x64"
          mkdir -p build
          dart compile exe bin/chapose.dart -o build/$EXECUTABLE_NAME --target-os=linux --target-arch=x64
      - name: Compile Linux arm64
        run: |
          EXECUTABLE_NAME="chapose-${{ needs.get_version.outputs.app_version_base }}-linux-arm64"
          mkdir -p build
          dart compile exe bin/chapose.dart -o build/$EXECUTABLE_NAME --target-os=linux --target-arch=arm64
      - name: Compile Linux arm32
        run: |
          EXECUTABLE_NAME="chapose-${{ needs.get_version.outputs.app_version_base }}-linux-arm"
          mkdir -p build
          dart compile exe bin/chapose.dart -o build/$EXECUTABLE_NAME --target-os=linux --target-arch=arm
      - name: Compile Linux riscv64
        run: |
          EXECUTABLE_NAME="chapose-${{ needs.get_version.outputs.app_version_base }}-linux-riscv64"
          mkdir -p build
          dart compile exe bin/chapose.dart -o build/$EXECUTABLE_NAME --target-os=linux --target-arch=riscv64
      - name: Write build info
        run: |
          cat > build/BUILD_INFO.txt <<EOF
          project=chapose
          version=${{ needs.get_version.outputs.app_version_base }}
          version_full=${{ needs.get_version.outputs.app_version }}
          git_ref=${{ inputs.ref }}
          git_sha=${{ github.sha }}
          run_id=${{ github.run_id }}
          run_attempt=${{ github.run_attempt }}
          built_os=linux
          built_arch=multi
          EOF
      - name: Upload Linux x64
        uses: actions/upload-artifact@v4
        with:
          name: chapose-linux-x64-${{ needs.get_version.outputs.app_version_base }}
          retention-days: 30
          path: |
            chapose/build/chapose-${{ needs.get_version.outputs.app_version_base }}-linux-x64
            chapose/build/BUILD_INFO.txt
            chapose/LICENSE
            chapose/*.md
            chapose/doc/en/*.md
            chapose/doc/zh/*.md
      - name: Upload Linux arm64
        uses: actions/upload-artifact@v4
        with:
          name: chapose-linux-arm64-${{ needs.get_version.outputs.app_version_base }}
          retention-days: 30
          path: |
            chapose/build/chapose-${{ needs.get_version.outputs.app_version_base }}-linux-arm64
            chapose/build/BUILD_INFO.txt
            chapose/LICENSE
            chapose/*.md
            chapose/doc/en/*.md
            chapose/doc/zh/*.md
      - name: Upload Linux arm32
        uses: actions/upload-artifact@v4
        with:
          name: chapose-linux-arm32-${{ needs.get_version.outputs.app_version_base }}
          retention-days: 30
          path: |
            chapose/build/chapose-${{ needs.get_version.outputs.app_version_base }}-linux-arm
            chapose/build/BUILD_INFO.txt
            chapose/LICENSE
            chapose/*.md
            chapose/doc/en/*.md
            chapose/doc/zh/*.md
      - name: Upload Linux riscv64
        uses: actions/upload-artifact@v4
        with:
          name: chapose-linux-riscv64-${{ needs.get_version.outputs.app_version_base }}
          retention-days: 30
          path: |
            chapose/build/chapose-${{ needs.get_version.outputs.app_version_base }}-linux-riscv64
            chapose/build/BUILD_INFO.txt
            chapose/LICENSE
            chapose/*.md
            chapose/doc/en/*.md
            chapose/doc/zh/*.md
